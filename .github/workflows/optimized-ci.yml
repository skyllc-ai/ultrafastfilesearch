# UFFS Tier 2 Nightly CI
# Copyright (c) 2025-2026 SKY, LLC.
# SPDX-License-Identifier: MPL-2.0
#
# Tier 2 keeps the slower nightly checks out of the PR path while still
# exercising the important scheduled/on-demand validation gates.

name: 🌙 UFFS Tier 2 Nightly CI

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target
  # Disable sccache in CI - it's configured in .cargo/config.toml for local dev
  # but not installed on GitHub Actions runners
  RUSTC_WRAPPER: ""
  # Limit parallel jobs to reduce memory pressure during Polars compilation
  # GitHub Actions runners have limited RAM; too many parallel rustc processes
  # can trigger OOM killer or runner preemption (exit code 143)
  CARGO_BUILD_JOBS: 2

jobs:
  file-size-policy:
    name: Tier 2 / File Size Policy
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce file size policy
        run: bash scripts/ci/check_file_size_policy.sh

  coverage:
    name: Tier 2 / Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Free up disk space
        run: |
          echo "🧹 Freeing up disk space for Polars compilation..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install tools
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage report
        run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: lcov.info
          # Explicit slug so the uploader doesn't have to infer the repo
          # from GitHub Actions env vars (more robust on fork PRs, workflow
          # renames, etc.).  Recommended by the Codecov setup wizard.
          slug: skyllc-ai/UltraFastFileSearch
          # Token is optional: the Codecov org currently allows tokenless
          # uploads.  If `CODECOV_TOKEN` is ever added as a repo secret,
          # this reference picks it up automatically without a YAML edit.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # NOTE: A `Tier 2 / Windows Cross-Check` job lived here until 2026-04-21.
  # It ran `cargo check --target x86_64-pc-windows-msvc` from `ubuntu-latest`,
  # which has no MSVC linker / import libraries, so the check could never
  # succeed without a full `xwin` SDK install (see
  # `docs/xwin-msvc-rlib-size-root-cause-and-workarounds.md`).  Real Windows
  # validation happens on `windows-latest` in `release.yml` and on the user's
  # Windows hardware via `cross-tool-benchmark.rs`; cross-compiling the
  # workspace from Linux added no signal and permanently red-X'd Tier 2.
  # The job has been removed from both the job list and the summary
  # `needs:` array below.

  build-validation:
    name: Tier 2 / Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run build validation
        run: cargo build --workspace --all-features --bins

  udeps:
    name: Tier 2 / cargo-udeps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-udeps
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-udeps

      - name: Run cargo-udeps
        run: cargo udeps --workspace --all-targets --all-features

  miri:
    name: Tier 2 / Miri
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run focused Miri coverage
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: |
          # These raw persistence tests use temp files, so Miri needs isolation disabled.
          # Keep coverage focused on the subset that runs under Miri today; the zstd-backed
          # compressed raw test uses foreign-function calls that Miri does not support.
          cargo miri test -p uffs-mft raw::tests::test_header_roundtrip -- --exact
          cargo miri test -p uffs-mft raw::tests::test_load_header_only -- --exact
          cargo miri test -p uffs-mft raw::tests::test_save_load_uncompressed -- --exact
          cargo miri test -p uffs-mft raw::tests::test_raw_compat_mode -- --exact

  tier-2-summary:
    name: Tier 2 / Summary
    runs-on: ubuntu-latest
    needs: [coverage, build-validation, udeps, miri]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check pipeline success
        run: |
          if [[ "${{ needs.coverage.result }}" == "success" && \
                "${{ needs.build-validation.result }}" == "success" && \
                "${{ needs.udeps.result }}" == "success" && \
                "${{ needs.miri.result }}" == "success" ]]; then
            echo "✅ All Tier 2 nightly checks passed!"
          else
            echo "❌ Some Tier 2 nightly checks failed - review above"
            exit 1
          fi

      - name: Create summary
        if: success()
        run: |
          echo "## ✅ UFFS Tier 2 Nightly CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo-udeps | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Miri | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # Failure Notification — opens a GitHub Issue on any job failure
  # ═══════════════════════════════════════════════════════════════════════════

  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [coverage, build-validation, udeps, miri]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = `🔴 CI Failure: Tier 2 Nightly CI — ${context.sha.substring(0, 7)}`;
            const body = [
              `## CI Pipeline Failed`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Workflow** | \`${context.workflow}\` |`,
              `| **Run** | [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Commit** | [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}) |`,
              `| **Triggered by** | @${context.actor} |`,
              ``,
              `📧 Notification sent to: githubrobbi@nios.net`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
              core.info(`Updated existing issue #${existing.data[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure'],
                assignees: ['githubrobbi'],
              });
              core.info('Created new failure issue');
            }