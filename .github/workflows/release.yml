name: 🚀 UFFS Release Pipeline

run-name: 🚀 UFFS Release ${{ inputs.version || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.192)'
        required: true
        type: string
      triggered_by:
        description: 'Workflow that triggered this release'
        required: false
        default: 'manual'
        type: string
      commit_sha:
        description: 'Commit SHA to release'
        required: false
        type: string
  push:
    tags:
      - 'v*'

# Serialise release dispatches so two version bumps landing in quick
# succession (or a tag-push colliding with an auto-tag-release dispatch)
# queue cleanly.  `cancel-in-progress: false` because a half-finished
# release must either complete or fail with an attestation — never be
# killed mid-upload — so the SLSA provenance in the Attestations API
# can never claim an artifact that was not actually published.
concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  # `actions: write` (was `read`) so the `submit-winget` job can dispatch
  # `winget-publish.yml` via `gh workflow run` after the release lands.
  # Per-job blocks can only NARROW this, so it must be granted here; every
  # other job re-declares a narrower per-job `permissions:` set and does
  # not inherit write.
  actions: write
  issues: write
  # SLSA build-provenance attestation flow (P1 hardening):
  #   - `id-token: write` lets the runner mint an OIDC token
  #     identifying this workflow run to the Sigstore Fulcio CA.
  #   - `attestations: write` lets `actions/attest-build-provenance`
  #     post the resulting attestation to this repository via the
  #     GitHub Attestations API.
  # Both scopes are idle unless the attest step actually runs, so
  # there is no exposure outside the create-github-release job.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Override `.cargo/config.toml`'s `rustc-wrapper = "sccache"` setting.
  # sccache is a developer-machine convenience (`cargo install sccache`);
  # GitHub-hosted runners don't have it pre-installed, so every `cargo`
  # invocation fails immediately with `could not execute process sccache …`
  # (see fork test run #24777036796 where all three build targets hit
  # exit code 101 on this).  An empty `RUSTC_WRAPPER` disables the wrapper
  # without touching config.toml (which would hurt local dev UX).
  # `pr-fast.yml` carries the same override for the same reason.
  RUSTC_WRAPPER: ""
  # NOTE: no workflow-level RUSTFLAGS here.  Each matrix row carries its own
  # `rustflags` field so every target gets a stable CPU baseline appropriate
  # for its ISA — never `target-cpu=native`, because a release binary built
  # on today's GitHub runner would SIGILL on any end-user CPU missing the
  # runner's detected feature set (observed previously with `target-cpu=native`
  # → proc-macro dylib SIGILL on nightly-2026-04-21; same rationale noted
  # in `pr-fast.yml`'s top-level env block).
  # Baselines used below:
  #   x86_64 Linux / Windows   : x86-64-v3 (Haswell+/Zen+, AVX2+BMI2+FMA)
  #   aarch64-apple-darwin     : apple-m1  (M1+, forward-compatible with M2/M3/M4)

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1: Release Preparation & Validation
  # ═══════════════════════════════════════════════════════════════════════════

  release-preparation:
    name: 📋 Release Preparation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Explicit per-job scopes so this job does NOT inherit the
    # workflow-level `actions: write` (granted only for the
    # `submit-winget` dispatch).  This job needs `contents: write` for
    # its `gh release create --draft` preflight; `actions` stays read —
    # the rollback-attack guard below deliberately must NOT run with
    # `actions: write`.
    permissions:
      contents: write
      actions: read
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
      release-name: ${{ steps.validate.outputs.release-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.commit_sha || github.sha }}
          fetch-depth: 0

      - name: Validate release inputs
        id: validate
        shell: bash
        run: |
          # Handle both workflow_dispatch and tag push
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: v0.1.192"
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=$VERSION"
            echo "release-name=UFFS $VERSION"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Release validation passed"
          echo "📦 Version: $VERSION"
          echo "🏷️ Tag: $VERSION"
          echo "🚀 Triggered by: ${{ inputs.triggered_by || 'tag-push' }}"

      - name: Pre-flight — verify Actions token can create releases
        # Belt-and-suspenders guard against a silent repo-level
        # permissions clamp.
        #
        # The workflow's top-level `permissions:` block (and the
        # `create-github-release` job's per-job override) both declare
        # `contents: write`, which softprops/action-gh-release needs
        # in order to POST the v* git tag and release row.  However,
        # the repository-level toggle at "Settings → Actions →
        # General → Workflow permissions" can clamp every job's
        # GITHUB_TOKEN to read-only at runtime regardless of what
        # the workflow declares.  When that happens, the build
        # matrix burns ~30 minutes and then `create-github-release`
        # dies with the cryptic:
        #
        #   HTTP 403 — Resource not accessible by integration
        #
        # The failure mode is silent until that step is reached.
        # See release pipeline #98 / v0.5.99 — three platforms built
        # for 32 min each, then the publish step failed in 1 s with
        # the 403, and we had to drop the run and re-dispatch after
        # flipping the setting.
        #
        # This step exercises the EXACT REST path that the failing
        # action uses, but with a throwaway draft release that is
        # immediately deleted.  A read-only-clamped token fails the
        # `gh release create --draft` call in ~1 s with the same 403,
        # at which point we surface a precise actionable error
        # pointing at the toggle that needs flipping.
        #
        # Why a draft release and not a direct `actions/permissions`
        # API probe: reading `/repos/.../actions/permissions/workflow`
        # requires the `administration: read` scope, which neither
        # this workflow nor the repo-default GITHUB_TOKEN carries.
        # The synthetic create-draft-then-delete probe uses the
        # `contents: write` scope this job already declares, so it
        # works without widening the workflow's permission surface.
        #
        # Draft releases do not create the underlying git tag (only
        # published releases do), so cleanup is just the release-row
        # delete — no orphaned tags can leak even if the cleanup
        # step itself fails.  The throwaway tag name includes both
        # `run_id` and `run_attempt` so concurrent / retried
        # invocations cannot collide.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TEST_TAG="preflight-permcheck-run${{ github.run_id }}-attempt${{ github.run_attempt }}"
          echo "Probing release-create permissions with synthetic draft: $TEST_TAG"

          if ! gh release create "$TEST_TAG" \
                 --repo "${{ github.repository }}" \
                 --draft \
                 --notes "Preflight permissions check; auto-deleted within seconds." \
                 --title "permcheck (auto-deleted)" 2>/tmp/perm-err.log; then
              ERR=$(cat /tmp/perm-err.log)
              echo "::error title=Workflow permissions block release publish::Failed to create a draft release as a preflight permissions probe — see annotation below."
              cat <<EOF
          ❌ Pre-flight permissions probe FAILED.

          The probe attempted to create a draft release ($TEST_TAG)
          and \`gh release create\` returned:

          ${ERR}

          Most common cause: the repository's "Workflow permissions"
          setting is "Read repository contents and packages
          permissions", which clamps the per-job GITHUB_TOKEN to
          read-only at runtime regardless of what the workflow file
          declares.  softprops/action-gh-release in the
          create-github-release job would fail with HTTP 403
          ("Resource not accessible by integration") after the build
          matrix (~30 min).  Catching it here saves the ~30 min.

          To fix, flip the toggle to "Read and write permissions":
            https://github.com/${{ github.repository }}/settings/actions

          Or via CLI (requires repo admin):
            gh api -X PUT /repos/${{ github.repository }}/actions/permissions/workflow \\
              -f default_workflow_permissions=write

          If the repo-level setting is already "Read and write" but
          the probe still fails, the organization's default at
            https://github.com/organizations/<org>/settings/actions
          may be set to read-only and is cascading down to every repo.
          Fix it at the org level (or have an org admin do it), then
          re-dispatch this workflow.

          Regression history: pipeline #98 / v0.5.99.
          EOF
              exit 1
          fi

          # Cleanup: delete the draft release row.  Best-effort — if
          # delete fails, the draft is orphaned but harmless (drafts
          # do not create git tags, are not surfaced on the public
          # /releases page, and the unique tag name per
          # run_id+attempt prevents cross-run collisions).
          if ! gh release delete "$TEST_TAG" \
                 --repo "${{ github.repository }}" --yes; then
              echo "::warning::Failed to clean up preflight draft release $TEST_TAG; orphan is harmless but visible to repo admins via /releases?per_page=100."
          fi

          echo "✅ Workflow permissions allow release publish"

      - name: Check if tag or release already exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          # Guard 1 — git tag.  The release workflow creates the tag via
          # action-gh-release's REST path; a colliding tag would be
          # silently treated as "already created" and the build would
          # publish over the existing one.
          if git tag -l | grep -q "^${TAG}$"; then
            echo "::error title=Tag ${TAG} already exists::A git tag for ${TAG} already exists.  Bump the version in Cargo.toml + CHANGELOG.md and re-dispatch."
            exit 1
          fi

          # Guard 2 — GitHub release row.  Since 2025-Q4 GitHub publishes
          # releases as immutable by default.  When a release row exists
          # for $TAG but the git tag has been rolled back (e.g. a previous
          # release attempt failed AFTER the release was created but
          # BEFORE artifacts uploaded, then the tag was manually deleted),
          # action-gh-release tries to UPDATE the existing row's
          # target_commitish and GitHub rejects with:
          #
          #   Validation Failed: target_commitish cannot be changed when
          #   release is immutable
          #
          # The remedy is to bump the version, not to retry.  Surfacing
          # that here gives a clear error instead of the cryptic one from
          # action-gh-release.  See issue #150 / run 25549839464.
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error title=Release ${TAG} already published::A release for ${TAG} already exists on GitHub and is immutable.  GitHub does not allow re-publishing the same version.  Bump the version in Cargo.toml + CHANGELOG.md and re-dispatch."
            exit 1
          fi

          echo "✅ Tag and release are both available for ${TAG}"

      - name: Validate commit_sha is ancestor of main (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.commit_sha != ''
        shell: bash
        run: |
          # Rollback-attack guard.  An attacker with `actions: write`
          # (e.g. a compromised bot token) could otherwise invoke this
          # workflow with a `commit_sha` pointing at an ARBITRARY
          # commit — including one from an unreviewed feature branch,
          # or a commit prior to a security fix — and have the
          # release assets built from that code.  This step rejects
          # any commit_sha that isn't on main's history.
          #
          # `git merge-base --is-ancestor A B` exits 0 iff A is an
          # ancestor of B (commits equal count as ancestor).
          git fetch origin main:refs/remotes/origin/main --quiet
          if ! git merge-base --is-ancestor "${{ inputs.commit_sha }}" origin/main; then
            echo "::error::commit_sha ${{ inputs.commit_sha }} is not an ancestor of origin/main."
            echo "  Only commits that have already landed on main can be released."
            echo "  If this commit is legitimate, merge it to main first."
            exit 1
          fi
          echo "✅ commit_sha ${{ inputs.commit_sha }} is on main's history"

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2: Cross-Platform Binary Builds
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # Target matrix
  #
  # Three targets, each earning its slot:
  #   - x86_64-pc-windows-msvc   — primary product: live NTFS MFT indexing
  #   - aarch64-apple-darwin     — offline MFT analysis on Apple Silicon
  #   - x86_64-unknown-linux-gnu — offline MFT analysis on Linux (servers,
  #                                forensics VMs, Docker, CI harnesses)
  #
  # Dropped vs previous iterations:
  #   - x86_64-apple-darwin (Intel Mac) — Apple deprecated the platform;
  #     Apple Silicon ARM64 build runs under Rosetta 2 if absolutely needed.
  #
  # Per-target `rustflags` (stable baselines, never `native`):
  #   - x86_64 Linux/Windows: `target-cpu=x86-64-v3` — Haswell+/Zen+ ISA.
  #   - aarch64 macOS:         `target-cpu=apple-m1` — M1 baseline forwards-
  #     compatible with M2/M3/M4 while avoiding config.toml's `native`
  #     override which would bake in runner-specific chip detection.
  # ─────────────────────────────────────────────────────────────────────────
  build-release-binaries:
    name: 🔨 Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: release-preparation
    timeout-minutes: ${{ matrix.timeout }}
    # Explicit read-only scope so this job does NOT inherit the
    # workflow-level `actions: write` (granted only for `submit-winget`).
    # The build only checks out + compiles + uploads artifacts — no
    # write scope is needed.
    permissions:
      contents: read
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Timeouts are sized for a COLD build (empty rust-cache).
          # LTO=fat + codegen-units=1 + Polars-heavy workspace is slow on
          # 2-core GitHub-hosted runners — especially ubuntu-22.04.  Warm
          # subsequent runs are roughly 1/3 of these numbers.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact-name: uffs-windows-x64
            binary-suffix: ".exe"
            rustflags: "-C target-cpu=x86-64-v3"
            timeout: 75
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact-name: uffs-macos-arm64
            binary-suffix: ""
            rustflags: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
            timeout: 45
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact-name: uffs-linux-x64
            binary-suffix: ""
            rustflags: "-C target-cpu=x86-64-v3 -C link-arg=-Wl,--gc-sections"
            timeout: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Free up disk space (Linux only)
        if: runner.os == 'Linux'
        run: |
          # Polars + ring + LTO=fat combined consume significant disk on
          # ubuntu-22.04's default 14GB free budget.  Reclaim ~20GB from
          # preinstalled SDKs we do not use for a release build.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - name: Install pinned nightly (from rust-toolchain.toml)
        shell: bash
        run: |
          # `rustup show` reads `rust-toolchain.toml` and installs the
          # exact channel + components pinned there.
          rustup show

          # Defensive: on `macos-latest` runner images the
          # `~/.cargo/bin/cargo` proxy is occasionally a stale symlink
          # pointing at `rustup-init` (the installer) instead of the
          # proxy that forwards to the active toolchain's real cargo.
          # When that happens, every subsequent `cargo build` /
          # `cargo metadata` exits with `error: unexpected argument
          # 'build' found` and a `rustup_init::run_rustup_inner`
          # backtrace.  Forcibly re-setting the default toolchain
          # rewrites the proxy binaries in `~/.cargo/bin`, so the
          # symlinks resolve to the active toolchain's cargo.
          #
          # This step mirrors the same defensive repair in
          # `release-cache-warm.yml`; keep them in sync.  Note that the
          # repair is *also* re-applied after the Swatinem/rust-cache
          # restore (next step), because the cache itself can hold a
          # poisoned `~/.cargo/bin/cargo` that overwrites the freshly
          # repaired proxy — see "Repair rustup proxy after cache
          # restore" below.
          rustup default "$(rustup show active-toolchain | awk '{print $1}')"

          # Fail-fast smoke check: surface a broken proxy in ~1 s here
          # instead of letting Swatinem/rust-cache's `cargo metadata`
          # (and then a 30+ min `cargo build`) silently waste runner
          # minutes before failing on the same root cause.  On the
          # production release pipeline this matters even more: a 30+
          # min late failure on a tag-dispatched run delays the
          # release by a full re-run cycle.
          cargo --version
          rustc --version

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # `shared-key:` (not `key:`) so the action's built-in fallback
          # restores partial matches when `Cargo.lock` shifts between
          # releases.  `just ship` runs `cargo update` on every release,
          # which changes the `Cargo.lock` hash and would force an exact
          # `key:` to miss every single time (issue #80).  `shared-key:`
          # gives us the same cache-key prefix on every release-${target}
          # invocation and lets the action recover ~80-90 % of the
          # previous compile graph; only crates whose sources actually
          # changed need recompilation.  `pr-fast.yml` uses the same
          # pattern; the divergence here was unintentional.
          #
          # The cache this step restores is kept warm by
          # `release-cache-warm.yml` — that workflow runs the same
          # `shared-key` build on every Cargo-affecting `main` push
          # plus a weekly cron, so the cache's last-access timestamp
          # is refreshed often enough to survive GitHub's 7-day TTL +
          # 10-GB-cap LRU eviction.  Without it, releases paid the
          # full cold-build tax every time (issue #132).  If you
          # change the build invocation below, mirror the change in
          # `release-cache-warm.yml::warm` so the warmed cache stays
          # bit-compatible with what this job needs.
          shared-key: release-${{ matrix.target }}
          cache-on-failure: 'true'

      - name: Repair rustup proxy after cache restore (macOS guard)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # `Swatinem/rust-cache` (above) restores `~/.cargo/bin/` from
          # a prior run's cache.  On `macos-latest` that cache can
          # contain a poisoned `cargo` proxy: an earlier run's
          # `~/.cargo/bin/cargo` was a symlink to `rustup-init` (the
          # installer) rather than the toolchain proxy, and the cache
          # captured that bad state.  Restoring it here overwrites the
          # freshly-repaired proxy from the "Install pinned nightly"
          # step, so the very next `cargo build` exits with
          # `error: unexpected argument 'build' found` and a
          # `rustup_init::run_rustup_inner` backtrace.
          #
          # Re-running `rustup default` *after* the cache restore
          # rewrites the proxy binaries in `~/.cargo/bin` again, so
          # `cargo build` resolves to the active toolchain's real
          # cargo even when the restored cache was poisoned.  On the
          # next successful run, `Swatinem/rust-cache` will save a
          # clean cache, and the poison clears itself.
          #
          # See release pipeline #97 / v0.5.98 for the regression that
          # motivated this step.  Mirror any change here in
          # `release-cache-warm.yml`.
          rustup default "$(rustup show active-toolchain | awk '{print $1}')"
          cargo --version

      - name: Build optimized release binaries
        shell: bash
        run: |
          echo "🔨 Building optimized release binaries for ${{ matrix.target }}"
          echo "   RUSTFLAGS=$RUSTFLAGS"

          # Build all workspace binaries for the target.  Profile settings
          # (LTO=fat, codegen-units=1, strip=symbols, panic=abort) come from
          # [profile.release] in Cargo.toml — do NOT override them here.
          # The previous `CARGO_PROFILE_RELEASE_LTO=false` override silently
          # disabled LTO in release artifacts; removed so users get the
          # perf the profile was designed for.
          #
          # --locked per §2.8 policy.  Release builds MUST resolve
          # through the committed Cargo.lock or the binaries we ship
          # may differ from what the tests validated — worst-case a
          # silent dep drift ships to end-users.  CI fails loudly
          # instead.
          cargo build --locked --release --target ${{ matrix.target }} --workspace --bins

          echo "✅ Build completed for ${{ matrix.target }}"

      - name: Re-codesign macOS binaries (post-strip)
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          # `[profile.release].strip = "symbols"` in Cargo.toml strips the
          # Mach-O symbol table AFTER the linker has emitted an ad-hoc
          # (linker-signed) CodeDirectory.  Strip changes the on-disk hash
          # the CodeDirectory was computed over, leaving the signature
          # internally inconsistent.  macOS 26+'s taskgated then refuses
          # to launch the binary with `SIGKILL (Code Signature Invalid)`
          # / namespace=CODESIGNING / "Taskgated Invalid Signature".
          #
          # Re-stamping the ad-hoc signature with `codesign --force
          # --sign -` recomputes the CodeDirectory over the post-strip
          # bytes so the in-memory hash matches the on-disk file again.
          # We deliberately stay ad-hoc: we don't have an Apple Developer
          # ID; the resulting binaries are still unnotarized and users
          # see the standard "open anyway" Gatekeeper prompt on first
          # launch.  But they no longer get killed at exec time.
          #
          # Gated on `apple-darwin` so Windows / Linux artifact paths
          # stay untouched.
          set -euo pipefail
          for bin in uffs uffsd uffsmcp uffs-mft uffs-update; do
            path="target/${{ matrix.target }}/release/$bin"
            if [[ -f "$path" ]]; then
              codesign --force --sign - "$path"
              codesign --verify --verbose=2 "$path"
            fi
          done

      - name: Show binary sizes
        shell: bash
        run: |
          echo "📐 Release binary sizes:"
          # Iterate the explicit shipping-set names (avoids `ls | grep`, SC2010).
          # Use `if … then … fi` rather than `[[ -f $bin ]] && ls …` so a missing
          # file on the final iteration does not propagate exit-1 out of the
          # loop under `bash -e` (e.g. uffs-mft.exe is absent on non-Windows
          # targets, which broke release pipeline #96 / v0.5.97).
          for bin in target/${{ matrix.target }}/release/uffs \
                     target/${{ matrix.target }}/release/uffsd \
                     target/${{ matrix.target }}/release/uffsmcp \
                     target/${{ matrix.target }}/release/uffs-mft \
                     target/${{ matrix.target }}/release/uffs-update \
                     target/${{ matrix.target }}/release/uffs.exe \
                     target/${{ matrix.target }}/release/uffsd.exe \
                     target/${{ matrix.target }}/release/uffsmcp.exe \
                     target/${{ matrix.target }}/release/uffs-mft.exe \
                     target/${{ matrix.target }}/release/uffs-broker.exe \
                     target/${{ matrix.target }}/release/uffs-update.exe; do
            if [[ -f "$bin" ]]; then
              ls -lh "$bin"
            fi
          done

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p release-artifacts

          # Shipping set — kept in lockstep with `RELEASE_BINARIES` in
          # scripts/ci/build-cross-all.rs.  Diagnostic binaries are NOT
          # shipped; they live in uffs-diag and stay workspace-only.
          # uffs-update (the self-update helper) ships on every platform so
          # `uffs --update` has its sibling; uffs-broker is a Windows-only
          # service, so its raw binary ships on Windows only.
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            for binary in uffs.exe uffsd.exe uffsmcp.exe uffs-mft.exe uffs-broker.exe uffs-update.exe; do
              if [[ -f "target/${{ matrix.target }}/release/$binary" ]]; then
                cp "target/${{ matrix.target }}/release/$binary" release-artifacts/
              fi
            done
          else
            for binary in uffs uffsd uffsmcp uffs-mft uffs-update; do
              if [[ -f "target/${{ matrix.target }}/release/$binary" ]]; then
                cp "target/${{ matrix.target }}/release/$binary" release-artifacts/
              fi
            done
          fi

          # Create checksums.  Using `./*` guards against a future file
          # named like `-foo` being parsed as an option by sha256sum /
          # shasum (SC2035).
          cd release-artifacts
          if command -v sha256sum >/dev/null; then
            sha256sum ./* > checksums.txt
          else
            shasum -a 256 ./* > checksums.txt
          fi

          echo "📦 Packaged binaries:"
          ls -la

      - name: Stage release bundles (min / normal / full)
        shell: bash
        env:
          # `gh release download` reads the public githubrobbi/uffs-demo
          # repo.  The default GITHUB_TOKEN can read public release assets,
          # so no extra secret is needed.  The demo is versioned
          # INDEPENDENTLY of the engine — we fetch its latest TUI build and
          # bundle it as the zero-friction front door (`uffs-tui`) so a new
          # user can launch a UI on their own data without touching the CLI.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "🎁 Staging release bundles (min / normal / full) for ${{ matrix.target }}..."

          ARTIFACT="${{ matrix.artifact-name }}"   # e.g. uffs-windows-x64
          TRIPLE="${{ matrix.target }}"
          OS="${{ matrix.os }}"
          BINDIR="target/${TRIPLE}/release"
          PLAT="${ARTIFACT#uffs-}"                 # windows-x64 / macos-arm64 / linux-x64
          if [[ "$OS" == "windows-latest" ]]; then EXT=".exe"; else EXT=""; fi

          # Diagnostic tools (uffs-diag) — built by `--workspace --bins`
          # above; shipped ONLY in the `full` tier.  Kept in lockstep with
          # ALL_BINARIES in scripts/ci/build-cross-all.rs.
          DIAG_BINS=(analyze-mft-parents dump-mft-records scan-mft-magic \
                     dump-mft-extents cross-check-mft-reference compare-raw-mft \
                     inspect-mft-record-flow analyze-diff compare-scan-parity \
                     verify-iocp-capture)

          # ── Fetch the free demo TUI (non-fatal) ────────────────────────────
          # Bundled into EVERY tier so `uffs-tui` works straight out of the
          # zip.  If the asset is missing or the download fails, we emit a
          # warning and ship the engine bundles WITHOUT the demo — a
          # demo-repo hiccup must never block an engine release.
          mkdir -p demo
          DEMO_ASSET="uffs_tui-demo-${PLAT}${EXT}"
          DEMO_BIN=""
          if gh release download --repo githubrobbi/uffs-demo \
               --pattern "$DEMO_ASSET" --dir demo --clobber; then
            DEMO_BIN="demo/${DEMO_ASSET}"
            chmod +x "$DEMO_BIN" 2>/dev/null || true
            echo "✅ Fetched demo TUI: ${DEMO_ASSET}"
          else
            echo "::warning title=Demo TUI unavailable::Could not fetch ${DEMO_ASSET} from githubrobbi/uffs-demo — shipping engine bundles without the bundled TUI demo."
          fi

          # ── Tier staging helper ────────────────────────────────────────────
          #   $1 = zip basename (also the archive's single root dir)
          #   $2 = tier: min | normal | full
          stage_bundle() {
            local zipbase="$1" tier="$2"
            local stage="release-staging/${zipbase}"
            rm -rf "$stage"; mkdir -p "$stage/assets"

            # Engine binaries per tier.  ALL tiers include uffs + uffsd:
            # the CLI auto-spawns the SEPARATE uffsd binary (find_daemon_exe
            # in uffs-client) — `uffs` alone cannot search.
            # uffs-update (self-update helper) is bundled in EVERY tier so
            # `uffs --update` / `uffs --update doctor` work wherever uffs is
            # installed — including the winget package (the normal-tier zip).
            local engine_bins=()
            case "$tier" in
              min)    engine_bins=(uffs uffsd uffs-update) ;;
              normal) engine_bins=(uffs uffsd uffsmcp uffs-mft uffs-update) ;;
              full)   engine_bins=(uffs uffsd uffsmcp uffs-mft uffs-update "${DIAG_BINS[@]}") ;;
            esac
            for b in "${engine_bins[@]}"; do
              if [[ -f "${BINDIR}/${b}${EXT}" ]]; then
                cp "${BINDIR}/${b}${EXT}" "$stage/"
              fi
            done

            # Broker service — Windows normal/full tiers only.  The CLI's
            # elevation help advertises `uffs-broker --install` as the
            # "one-time setup, no future UAC" path; the 2026-06-12 fresh-VM
            # dry run found the binary missing from the winget zip, making
            # that advice a dead end.  Non-Windows builds are a no-op stub,
            # so they stay out of the mac/linux bundles.
            if [[ "$OS" == "windows-latest" && "$tier" != "min" \
                  && -f "${BINDIR}/uffs-broker${EXT}" ]]; then
              cp "${BINDIR}/uffs-broker${EXT}" "$stage/"
            fi

            # Demo TUI — every tier, renamed to a clean `uffs-tui` command.
            if [[ -n "$DEMO_BIN" && -f "$DEMO_BIN" ]]; then
              cp "$DEMO_BIN" "$stage/uffs-tui${EXT}"
            fi

            # Licenses — engine (MPL-2.0) always; the demo notice is added
            # only when the demo is actually present, so the mixed-license
            # zip stays unambiguous.
            cp LICENSE "$stage/"
            if [[ -n "$DEMO_BIN" && -f packaging/DEMO-NOTICE.txt ]]; then
              cp packaging/DEMO-NOTICE.txt "$stage/DEMO-LICENSE.txt"
            fi

            # Docs + brand + packaging helpers — normal/full only; `min`
            # stays a lean engine + TUI payload.
            if [[ "$tier" != "min" ]]; then
              cp README.md TRADEMARK.md CHANGELOG.md "$stage/"
              case "$TRIPLE" in
                *-windows-*)
                  cp assets/brand/icons/uffs.ico     "$stage/assets/"
                  cp assets/brand/uffs-hero-1024.png "$stage/assets/"
                  ;;
                *-apple-*)
                  cp assets/brand/icons/uffs.icns    "$stage/assets/"
                  cp assets/brand/uffs-hero-1024.png "$stage/assets/"
                  mkdir -p "$stage/packaging/macos"
                  cp packaging/macos/Info.plist.in   "$stage/packaging/macos/"
                  cp packaging/macos/bundle.sh       "$stage/packaging/macos/"
                  chmod +x "$stage/packaging/macos/bundle.sh"
                  # Pre-build a ready-to-run UFFS.app inside the bundle so
                  # end users don't need to run bundle.sh themselves.
                  chmod +x packaging/macos/bundle.sh
                  packaging/macos/bundle.sh \
                    "${BINDIR}/uffs" "$stage/UFFS.app"
                  ;;
                *-linux-*)
                  cp -r assets/brand/icons/hicolor   "$stage/assets/"
                  cp assets/brand/uffs-hero-1024.png "$stage/assets/"
                  mkdir -p "$stage/packaging/linux"
                  cp packaging/linux/install.sh      "$stage/packaging/linux/"
                  cp packaging/linux/uffs.desktop    "$stage/packaging/linux/"
                  chmod +x "$stage/packaging/linux/install.sh"
                  ;;
              esac
            fi

            # ── ZIP the bundle ───────────────────────────────────────────────
            # 7z on Windows (pre-installed, no Git-Bash zip dependency);
            # `zip` on macOS/Linux.  `cd release-staging` first so the
            # archive's root entry is `${zipbase}/`, not
            # `release-staging/${zipbase}/` (fixes #92).
            if [[ "$OS" == "windows-latest" ]]; then
              (cd release-staging && \
               7z a -tzip "../release-artifacts/${zipbase}.zip" "${zipbase}" > /dev/null)
            else
              (cd release-staging && \
               zip -rq "../release-artifacts/${zipbase}.zip" "${zipbase}")
            fi
            echo "📦 ${zipbase}.zip:"; ls -la "release-artifacts/${zipbase}.zip"
          }

          # ── Emit the three tiers ────────────────────────────────────────────
          # The `normal` zip keeps the bare `${ARTIFACT}.zip` name so the
          # winget package (SkyLLC.UFFS, installers-regex
          # `uffs-windows-x64\.zip$`) and backwards-compat download URLs are
          # unchanged.  `min` and `full` are additive.
          stage_bundle "${ARTIFACT}-min"  min
          stage_bundle "${ARTIFACT}"      normal
          stage_bundle "${ARTIFACT}-full" full

          echo "📂 normal-tier staging tree:"
          find "release-staging/${ARTIFACT}" -maxdepth 4 -type f | sort

          # Clean up staging + downloaded demo; only the ZIPs survive into
          # the uploaded artifact.
          rm -rf release-staging demo

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact-name }}
          path: release-artifacts/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3: Create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════

  create-github-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-preparation, build-release-binaries]
    timeout-minutes: 15
    # Explicit per-job permissions matrix.  Documents the intent at the
    # point of use rather than relying on inheritance from the workflow-
    # level `permissions:` block ~520 lines up.  Note: a per-job block
    # only NARROWS the workflow-level grant — it cannot grant a scope
    # the workflow level didn't already declare.  More importantly, BOTH
    # are still clamped at runtime by the repo-level "Settings → Actions
    # → General → Workflow permissions" toggle.  If that toggle is set
    # to "Read repository contents and packages permissions", every
    # scope below is silently downgraded to read regardless of what is
    # written here.  The `Pre-flight — verify Actions token …` step in
    # `release-preparation` fails fast in that case so we don't burn
    # ~30 min of build time before discovering it.
    #
    #   contents: write       — softprops/action-gh-release creates the
    #                            v* git tag AND the release row via the
    #                            REST API.  Without this scope, the
    #                            create-release step fails with HTTP
    #                            403 "Resource not accessible by
    #                            integration" (see release pipeline
    #                            #98 / v0.5.99 for the regression).
    #   id-token: write       — OIDC token issuance for the SLSA
    #                            build-provenance attestation via
    #                            Sigstore Fulcio.
    #   attestations: write   — posts the resulting attestation to
    #                            this repo via GitHub's Attestations
    #                            API.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.commit_sha || github.sha }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts

      - name: Organize release assets
        shell: bash
        run: |
          mkdir -p final-release

          # Organize artifacts by platform.  Two shipping formats:
          #   - Per-platform ZIP bundle (everything: binaries + brand +
          #     docs + packaging helpers; the recommended download).
          #   - Individual raw binaries with platform suffix
          #     (backwards-compat URLs for users automating \`wget\` of
          #     a single binary).
          for artifact_dir in release-artifacts/*/; do
            artifact_name=$(basename "$artifact_dir")
            echo "Processing $artifact_name..."

            for file in "$artifact_dir"*; do
              if [[ -f "$file" && "$file" != *"checksums.txt" ]]; then
                filename=$(basename "$file")
                # ZIP bundles keep their original name (the platform
                # suffix is already baked into matrix.artifact-name).
                if [[ "$filename" == *.zip ]]; then
                  cp "$file" "final-release/$filename"
                  continue
                fi
                # Raw binaries get a platform suffix appended.
                if [[ "$artifact_name" == *"linux"* ]]; then
                  cp "$file" "final-release/${filename}-linux-x64"
                elif [[ "$artifact_name" == *"windows"* ]]; then
                  # $filename already ends in .exe from the windows build
                  base="${filename%.exe}"
                  cp "$file" "final-release/${base}-windows-x64.exe"
                elif [[ "$artifact_name" == *"macos-arm64"* ]]; then
                  cp "$file" "final-release/${filename}-macos-arm64"
                fi
              fi
            done
          done

          echo "📦 Staged release assets (pre-SBOM, pre-checksum):"
          ls -la final-release/

      # ─── CycloneDX SBOM ──────────────────────────────────────────────────
      #
      # Emits one `sbom-<crate>.cdx.json` per workspace crate into
      # `final-release/` so every shipped binary has a machine-readable
      # inventory of its resolved transitive dependencies.  cargo-cyclonedx
      # reads `Cargo.lock` — which is committed — so the SBOMs are
      # deterministic for (commit, features) and bit-identical across
      # re-runs.
      #
      # The SBOMs are produced BEFORE `CHECKSUMS.txt` is written and
      # BEFORE the SLSA attestation step so that:
      #
      #   1. `CHECKSUMS.txt` lists them, giving downloaders a single
      #      sha256-verifiable manifest.
      #   2. The SLSA attestation (`subject-path: final-release/*`) covers
      #      the SBOM bytes too, so a downstream consumer can:
      #
      #        gh attestation verify sbom-uffs-cli.cdx.json \
          #          --owner ${{ github.repository_owner }}
      #
      #      and prove the SBOM came from this exact workflow run.
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-cyclonedx

      - name: Install pinned nightly (needed by cargo-cyclonedx to read workspace)
        # cargo-cyclonedx shells out to `cargo metadata`, which requires
        # the workspace's pinned toolchain to be resolvable (rust-toolchain.toml).
        # `rustup show` installs & activates it in one step.
        run: rustup show

      - name: Generate CycloneDX SBOMs for every workspace crate
        shell: bash
        run: |
          set -euo pipefail

          echo "📋 Generating CycloneDX 1.5 SBOMs for workspace..."
          # --format json           : machine-readable
          # --all-features          : match the release-build feature set
          # --spec-version 1.5      : newest stable CycloneDX schema
          # default --describe=crate: one SBOM per crate, Cargo targets as subcomponents
          #
          # Output goes adjacent to each `Cargo.toml` as `<crate>.cdx.json`.
          cargo cyclonedx \
            --format json \
            --all-features \
            --spec-version 1.5

          # Collect the per-crate SBOMs into final-release/ with a uniform
          # `sbom-<crate>.cdx.json` prefix so downloaders can tell at a
          # glance which files are SBOMs.  `find` is used instead of a
          # glob because crates live one level down under crates/<crate>/.
          count=0
          while IFS= read -r sbom; do
            crate=$(basename "$(dirname "$sbom")")
            dest="final-release/sbom-${crate}.cdx.json"
            cp "$sbom" "$dest"
            count=$((count + 1))
          done < <(find crates -name '*.cdx.json' -type f)

          if (( count == 0 )); then
            echo "::error::cargo-cyclonedx produced no SBOMs — investigate the log above"
            exit 1
          fi

          echo "✅ Emitted $count SBOM(s):"
          ls -lh final-release/sbom-*.cdx.json

      - name: Finalize CHECKSUMS.txt (covers binaries, ZIP bundles, and SBOMs)
        shell: bash
        run: |
          cd final-release
          # Regenerate AFTER SBOMs are placed so the manifest is complete.
          # The SLSA attestation runs next and covers every file in this
          # directory, so there is no window where CHECKSUMS.txt is stale
          # relative to what ships.  `./*` guards against future filenames
          # that could be parsed as options by sha256sum (SC2035).
          sha256sum ./* > CHECKSUMS.txt

          # SHA256SUMS — the conventionally-named manifest the self-update
          # helper (`uffs-update acquire`) fetches by exact name.  It lists
          # every raw per-binary asset by its platform-suffixed name (e.g.
          # `uffsd-windows-x64.exe`), which is what the acquire verifier
          # matches on.  A copy of CHECKSUMS.txt is the simplest correct
          # source: identical sha256sum format, and the verifier matches by
          # basename so the extra zip/SBOM lines are harmless.  Generated
          # here (before the attestation step) so it is covered by SLSA.
          cp CHECKSUMS.txt SHA256SUMS

          echo "📦 Final release assets (SBOMs + checksums + SHA256SUMS included):"
          ls -la

      - name: Generate SLSA build-provenance attestation
        # Signs every file in `final-release/` with the workflow's
        # Sigstore OIDC identity, producing a SLSA Level 3 build-
        # provenance claim bound to (this workflow run, this commit,
        # this set of inputs).  Consumers then verify with:
        #
        #   gh attestation verify <asset> \
        #     --owner ${{ github.repository_owner }}
        #
        # Attestation is stored in the repo's attestations API, so it
        # survives independently of the GitHub Release asset (even if
        # someone with `contents: write` silently swaps a binary, the
        # SHA256 in the attestation won't match and `gh attestation
        # verify` fails).
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "final-release/*"

      - name: Generate release notes
        id: release-notes
        shell: bash
        run: |
          cat > release-notes.md << 'EOF'
          # UFFS ${{ needs.release-preparation.outputs.version }}

          ## 🚀 What's New

          See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ needs.release-preparation.outputs.version }})
          and `CHANGELOG.md` in the repository for details.

          ## 📦 Downloads

          UFFS is a **Windows-native NTFS search engine** — live indexing of
          the Master File Table requires Windows.  The engine core is
          cross-platform, so macOS and Linux builds are shipped for
          **offline MFT analysis** from captured `.mft` / `.bin` snapshots.

          Each platform ships as a **one-download ZIP bundle** in three
          tiers — pick the one that matches how much you need:

          | Tier | Zip suffix | Contents |
          |------|-----------|----------|
          | **min** | `-min.zip` | `uffs` + `uffsd` + `uffs-tui` demo. Lean engine for CI/scripting. |
          | **normal** | *(no suffix)* | min + `uffsmcp` + `uffs-mft` + docs + brand + packaging helper. **Recommended.** |
          | **full** | `-full.zip` | normal + the `uffs-diag` diagnostic tools. |

          > 🖥️ **Every tier bundles the free `uffs-tui` demo** — the
          > zero-setup front door.  After unzipping, just run `uffs-tui`
          > to browse your own drives in a UI (the daemon auto-starts).
          > The demo has capped result counts and disabled exports; see
          > `DEMO-LICENSE.txt` in the zip.  Full TUI/GUI are commercial.

          Individual binaries are also attached for automation that
          `wget`s a single file.

          ### 🟦 Windows x86_64 — primary live-indexing target
          - **`uffs-windows-x64.zip`** — recommended (normal tier): CLI +
            daemon + MCP + MFT tooling + `uffs-tui` demo + icon + docs.
            The `.exe`s ship with the UFFS icon and `asInvoker` manifest
            embedded.  Also: `uffs-windows-x64-min.zip`,
            `uffs-windows-x64-full.zip`.
          - Raw binaries: `uffs-windows-x64.exe`, `uffsd-windows-x64.exe`,
            `uffsmcp-windows-x64.exe`, `uffs-mft-windows-x64.exe`,
            `uffs-broker-windows-x64.exe`, `uffs-update-windows-x64.exe`.

          ### 🍏 macOS Apple Silicon — offline MFT analysis
          - **`uffs-macos-arm64.zip`** — recommended (normal tier): raw
            binaries + `uffs-tui` demo + a ready-to-run `UFFS.app` bundle
            + icns + docs + `packaging/macos/bundle.sh` for rebuilding.
            Also: `uffs-macos-arm64-min.zip`, `uffs-macos-arm64-full.zip`.
          - Raw binaries: `uffs-macos-arm64`, `uffsd-macos-arm64`,
            `uffsmcp-macos-arm64`, `uffs-mft-macos-arm64`, `uffs-update-macos-arm64`.
          - Intel Macs: run the arm64 build under Rosetta 2.

          ### 🐧 Linux x86_64 — offline MFT analysis
          - **`uffs-linux-x64.zip`** — recommended (normal tier): binaries
            + `uffs-tui` demo + full hicolor icon tree +
            `packaging/linux/install.sh` (drops the `.desktop` entry and
            icons under `/usr/local` with one `sudo` invocation) + docs.
            Also: `uffs-linux-x64-min.zip`, `uffs-linux-x64-full.zip`.
          - Raw binaries: `uffs-linux-x64`, `uffsd-linux-x64`,
            `uffsmcp-linux-x64`, `uffs-mft-linux-x64`, `uffs-update-linux-x64`.
          - Use with `--mft-file` to analyse captured MFT snapshots on servers, forensics VMs, or in Docker.

          ## 🔐 Verification

          All binaries are accompanied by SHA256 checksums in `CHECKSUMS.txt`
          (and `SHA256SUMS`, the conventionally-named copy the in-app
          self-update helper fetches).  Verify with:
          ```bash
          sha256sum -c CHECKSUMS.txt
          ```

          Additionally, every release asset carries a **SLSA build-
          provenance attestation** signed with the workflow's Sigstore
          OIDC identity.  Verify with GitHub CLI:
          ```bash
          gh attestation verify <file> --owner ${{ github.repository_owner }}
          ```
          A successful verification proves the bytes were produced by
          this exact workflow run on this exact commit.

          ### 📋 SBOM (Software Bill of Materials)

          Each workspace crate ships a CycloneDX 1.5 SBOM alongside the
          binaries: `sbom-<crate>.cdx.json`.  The SBOMs are covered by
          the same SLSA attestation as the binaries, so you can verify
          the inventory with the same command above.  Inspect with any
          CycloneDX-aware tool, e.g.:
          ```bash
          jq '.components[] | {name, version, purl}' sbom-uffs-cli.cdx.json
          ```

          ## 📋 Installation

          ### Recommended: ZIP bundle
          1. Download `uffs-<platform>.zip` for your platform.
          2. Unzip anywhere.
          3. **Windows**: the `.exe`s are ready to run; place them on `PATH`.  Icon + `asInvoker` manifest are already baked into the PE.
          4. **macOS**: double-click `UFFS.app`, or move the raw `uffs` binary into `/usr/local/bin/`.  First launch: Gatekeeper warns because the bundle is unsigned — right-click → Open to confirm, or run `xattr -dr com.apple.quarantine UFFS.app`.
          5. **Linux**: run `sudo packaging/linux/install.sh` from the unzipped directory — installs the binary, the `.desktop` entry, and the full hicolor icon set.  Override prefix with `sudo PREFIX=/opt/uffs packaging/linux/install.sh`.

          ### Raw-binary path (automation)
          - Download the individual binary, e.g. `uffs-linux-x64`.
          - macOS / Linux: `chmod +x uffs-*` then optionally `mv uffs-* /usr/local/bin/uffs`.
          - Windows: the `.exe` is ready to run; place it on `PATH`.

          ## 🛠️ Build Information

          - **Triggered by**: ${{ inputs.triggered_by || 'tag-push' }}
          - **Commit**: ${{ inputs.commit_sha || github.sha }}
          - **Toolchain**: pinned nightly from `rust-toolchain.toml`
          - **Profile**: `[profile.release]` — LTO=fat, codegen-units=1, strip=symbols
          - **CPU baselines**: x86_64 = `x86-64-v3` (Haswell+/Zen+); macOS ARM64 = `apple-m1` (M1+)

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ needs.release-preparation.outputs.version }}
          EOF

      - name: Create GitHub Release (creates tag via REST API)
        # Tag creation is handled by action-gh-release's built-in
        # logic rather than an explicit `git push origin $TAG`.
        # Rationale — avoid GitHub's workflow-file protection:
        #
        # The git protocol-level tag push is rejected by GitHub's
        # server-side check whenever the tag's target commit has
        # different workflow files than the default branch's current
        # HEAD.  That race fires whenever any PR touching
        # `.github/workflows/*` merges while a release.yml run is
        # in flight.  Observed with run #24795626228 (v99.98.99)
        # where PR #31's merge at 19:00:55Z made the 19:01:37Z tag
        # push fail with:
        #
        #   remote rejected: refusing to allow a GitHub App to
        #   create or update workflow `.github/workflows/
        #   auto-tag-release.yml` without `workflows` permission
        #
        # The REST API path (creating a `refs/tags/*` via
        # `POST /repos/:owner/:repo/git/refs`, which action-gh-
        # release uses internally when `tag_name` is set and the
        # tag does not yet exist) is not subject to the same
        # server-side guard, so it succeeds with just the default
        # `contents: write` permission.
        #
        # `target_commitish` pins the tag to the specific commit
        # we built from, not whatever main's HEAD happens to be at
        # action runtime.  Falls back to `github.sha` when
        # invoked via `push: tags: v*` (where `inputs.commit_sha`
        # is unset — the tag already exists so this field is
        # ignored anyway).
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.release-preparation.outputs.tag }}
          target_commitish: ${{ inputs.commit_sha || github.sha }}
          name: ${{ needs.release-preparation.outputs.release-name }}
          body_path: release-notes.md
          files: final-release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release summary
        shell: bash
        run: |
          # Single grouped redirect into $GITHUB_STEP_SUMMARY (SC2129),
          # with the variable quoted to survive any future path with
          # spaces in the runner-tmp directory (SC2086).
          {
            echo "## 🎉 Release ${{ needs.release-preparation.outputs.version }} Created!"
            echo ""
            echo "### 📦 Release Details:"
            echo "- **Version**: ${{ needs.release-preparation.outputs.version }}"
            echo "- **Tag**: ${{ needs.release-preparation.outputs.tag }}"
            echo "- **Triggered by**: ${{ inputs.triggered_by || 'tag-push' }}"
            echo "- **Commit**: ${{ inputs.commit_sha || github.sha }}"
            echo ""
            echo "### 🚀 Artifacts Built:"
            echo "- ✅ Windows x86_64 (primary — live NTFS MFT)"
            echo "- ✅ macOS ARM64 (offline MFT analysis)"
            echo "- ✅ Linux x86_64 (offline MFT analysis)"
            echo ""
            echo "### 🔗 Links:"
            echo "- [📦 Release Page](https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-preparation.outputs.tag }})"
            echo "- [📋 Full Changelog](https://github.com/${{ github.repository }}/commits/${{ needs.release-preparation.outputs.version }})"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # WinGet submission — dispatch winget-publish.yml after the release lands
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # Why dispatch instead of relying on `on: release` in winget-publish.yml:
  # the Release above is created with the default GITHUB_TOKEN, and GitHub
  # suppresses event cascades from GITHUB_TOKEN-authored actions — so a
  # `release: released` trigger would never fire.  Triggering another
  # workflow via `gh workflow run` (workflow_dispatch) IS a permitted
  # GITHUB_TOKEN action, so this is the robust path.
  #
  # Non-blocking: `continue-on-error: true` plus the job being outside every
  # other job's `needs:` graph means a winget hiccup (rate limit, token
  # rotation, microsoft/winget-pkgs outage) can never fail or roll back an
  # otherwise-successful release.
  submit-winget:
    name: 📦 Submit to WinGet
    runs-on: ubuntu-latest
    needs: [release-preparation, create-github-release]
    if: github.repository_owner == 'skyllc-ai'
    continue-on-error: true
    permissions:
      actions: write # required to dispatch winget-publish.yml via the API
    timeout-minutes: 5
    steps:
      - name: Dispatch winget-publish workflow for the release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-preparation.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Dispatching winget-publish.yml for ${RELEASE_TAG}"
          # Dispatch against the repo's default branch: `gh workflow run
          # --ref` resolves the workflow definition from that ref, and
          # winget-publish.yml always lives on the default branch.  Using
          # the default branch (not github.ref_name, which is the tag on a
          # `push: tags: v*` run) keeps the dispatch ref stable.
          default_branch="$(gh repo view "${GH_REPO}" --json defaultBranchRef -q .defaultBranchRef.name)"
          gh workflow run winget-publish.yml \
            --ref "${default_branch}" \
            -f "release-tag=${RELEASE_TAG}"
          echo "✅ winget-publish.yml dispatched for ${RELEASE_TAG} on ${default_branch} (runs independently; check the Actions tab)."

  # ═══════════════════════════════════════════════════════════════════════════
  # Failure Notification — opens a GitHub Issue on release failure
  # ═══════════════════════════════════════════════════════════════════════════

  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [release-preparation, build-release-binaries, create-github-release]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            // Per-workflow label so Release / Tier 1 / Tier 2 failures
            // triage to distinct issues instead of piling onto one.
            const label = 'ci-failure-release';
            const title = `🔴 Release Pipeline Failed — ${context.sha.substring(0, 7)}`;
            const body = [
              `## Release Pipeline Failed`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Workflow** | \`${context.workflow}\` |`,
              `| **Run** | [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Commit** | [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}) |`,
              `| **Triggered by** | @${context.actor} |`,
              ``,
              `⚠️ **This is a release pipeline failure — immediate attention required.**`,
              ``,
              `📧 Notification sent to: releasefail@uffs.io`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
              core.info(`Updated existing issue #${existing.data[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label, 'ci-failure'],
                assignees: ['githubrobbi'],
              });
              core.info('Created new failure issue');
            }
