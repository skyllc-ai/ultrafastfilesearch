name: 🧪 UFFS Tier 1 Nightly CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      # Any workflow edit re-runs CI so branch-protection checks always
      # report on PRs that touch e.g. release.yml (see PR #25 deadlock).
      - '.github/workflows/*.yml'
      - 'rust-toolchain.toml'
      - 'scripts/ci/check_file_size_policy.sh'
      - 'scripts/ci/file_size_exceptions.txt'
      - 'scripts/ci/ci-pipeline.rs'
      # Doc-only changes must still trigger Tier 1 because
      # `main-protection` has `bypass_actors: []` (no admin bypass) and
      # requires 6 Tier 1 status checks.  Without docs in paths, a
      # pure-doc PR (e.g. PR #35) would deadlock: paths filter skips
      # CI → required checks never report → branch protection blocks
      # merge indefinitely.  Cost is ~2 min of cached CI runs.
      - '**/*.md'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      # Any workflow edit re-runs CI so branch-protection checks always
      # report on PRs that touch e.g. release.yml (see PR #25 deadlock).
      - '.github/workflows/*.yml'
      - 'rust-toolchain.toml'
      - 'scripts/ci/check_file_size_policy.sh'
      - 'scripts/ci/file_size_exceptions.txt'
      - 'scripts/ci/ci-pipeline.rs'
      # Doc-only changes must still trigger Tier 1 because
      # `main-protection` has `bypass_actors: []` (no admin bypass) and
      # requires 6 Tier 1 status checks.  Without docs in paths, a
      # pure-doc PR (e.g. PR #35) would deadlock: paths filter skips
      # CI → required checks never report → branch protection blocks
      # merge indefinitely.  Cost is ~2 min of cached CI runs.
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target
  RUSTC_WRAPPER: ""
  CARGO_BUILD_JOBS: 2
  CARGO_INCREMENTAL: 0
  # Override codegen-units for test profile (belt-and-suspenders with Cargo.toml)
  CARGO_PROFILE_TEST_CODEGEN_UNITS: 16
  # Stable CPU baseline for ALL jobs that compile code in CI.  Overrides the
  # `target-cpu=native` flag baked into .cargo/config.toml's Linux section,
  # which is great for local dev but dangerous on GitHub-hosted runners:
  # LLVM reads /proc/cpuinfo at compile time and on the Azure/KVM fleet
  # sometimes over-reports instruction sets (AVX-512 etc.) that the runtime
  # VM cannot actually execute.  The resulting proc-macro dylibs then crash
  # with SIGILL when rustc loads them to expand derives (observed:
  # `thiserror-impl` → `object_store` under nightly-2026-04-21).
  # `x86-64-v3` = Haswell+ / Zen+ (AVX2 + BMI2 + FMA) which every GitHub-
  # hosted Linux runner supports, and the ISA is a fixed subset so LLVM
  # cannot mis-detect.  Jobs that need additional flags (e.g. debuginfo=1
  # for test backtraces) override this at the job level.
  RUSTFLAGS: "-C target-cpu=x86-64-v3 -C link-arg=-Wl,--gc-sections"

jobs:
  format-check:
    name: Tier 1 / Format
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Tier 1 / Clippy
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run nightly clippy gate
        run: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings

  rustdoc:
    name: Tier 1 / Rustdoc
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run rustdoc warnings gate
        run: RUSTDOCFLAGS="-Dwarnings" cargo doc --workspace --all-features --no-deps

  # ═══════════════════════════════════════════════════════════════════════════
  # Test Build — compile test binaries (heaviest step, separated so cache
  # is saved even if subsequent test execution fails)
  # ═══════════════════════════════════════════════════════════════════════════
  test-build:
    name: Tier 1 / Test Build
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      # Mirrors the workflow-level RUSTFLAGS (x86-64-v3 baseline, avoids
      # the CI SIGILL class discussed above) and adds `debuginfo=1` so
      # failing tests produce useful stack traces without paying the full
      # debuginfo=2 cost.  RUSTFLAGS env overrides both config.toml AND
      # the workflow-level env, so the full set must be repeated here.
      RUSTFLAGS: "-C debuginfo=1 -C target-cpu=x86-64-v3 -C link-arg=-Wl,--gc-sections"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: 'true'
          shared-key: test-build

      - name: Build test binaries
        run: |
          echo "::group::Compile workspace test targets"
          cargo test --workspace --all-features --lib --tests --no-run 2>&1
          echo "::endgroup::"

      - name: Report target size
        if: always()
        run: du -sh target/ || true

  # ═══════════════════════════════════════════════════════════════════════════
  # Tests — run the pre-compiled test binaries
  # ═══════════════════════════════════════════════════════════════════════════
  tests:
    name: Tier 1 / Tests
    runs-on: ubuntu-22.04
    needs: test-build
    timeout-minutes: 30
    env:
      # Must match test-build exactly so the cargo fingerprint lines up
      # and the cached test binaries are reused rather than rebuilt.
      RUSTFLAGS: "-C debuginfo=1 -C target-cpu=x86-64-v3 -C link-arg=-Wl,--gc-sections"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Restore build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: 'false'
          shared-key: test-build

      - name: Install nextest
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features --lib --tests --profile ci

  doc-tests:
    name: Tier 1 / Doc Tests
    runs-on: ubuntu-22.04
    needs: test-build
    timeout-minutes: 15
    env:
      # Match test-build / tests for shared artifact cache reuse.
      RUSTFLAGS: "-C debuginfo=1 -C target-cpu=x86-64-v3 -C link-arg=-Wl,--gc-sections"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Restore build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: 'false'
          shared-key: test-build

      - name: Run doc tests
        run: RUSTDOCFLAGS="-Dwarnings" cargo test --doc --workspace --all-features

  security:
    name: Tier 1 / Security
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-deny

      - name: Run dependency & license check
        run: cargo deny check

      # ─── cargo-vet: audit trail for every resolved crate ──────────────
      #
      # What this enforces:
      #
      #   Every crate-version in the resolved dep graph must be covered
      #   by either (a) an imported audit from a trusted upstream
      #   (Mozilla, Google, Bytecode Alliance, ISRG, Zcash), (b) an
      #   entry in our own `supply-chain/audits.toml`, or (c) a
      #   time-limited exemption in `supply-chain/config.toml`.
      #
      # When this fails:
      #
      #   A Dependabot PR (or any PR) bumping to a version the imports
      #   don't cover will fail here.  The fix is one of:
      #
      #     1. `cargo vet regenerate imports` — pulls the latest
      #        upstream audits; most bumps become covered this way
      #        because Mozilla/Google are fast to re-audit.
      #     2. `cargo vet regenerate exemptions` — grandfathers the
      #        new version in.  Acceptable for incidental bumps
      #        (pragmatic trade-off for a small team).
      #     3. `cargo vet certify <crate> <version>` — do the audit
      #        yourself; highest value but highest cost.
      #
      # The scheduled `cargo-vet-refresh.yml` workflow runs option 1
      # weekly, so in practice most Dependabot PRs sail through
      # without intervention.
      - name: Install cargo-vet
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-vet

      - name: Run cargo-vet check
        # `--locked` forbids fetching new imports at check time — the
        # dev (or the scheduled refresh) is responsible for keeping
        # imports.lock current.  This prevents a silent upstream
        # compromise from slipping through CI just because a fresh
        # audit record was added between the PR being opened and
        # the check running.
        run: cargo vet check --locked

  file-size-policy:
    name: Tier 1 / File Size Policy
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce file size policy
        run: bash scripts/ci/check_file_size_policy.sh

  # ═══════════════════════════════════════════════════════════════════════════
  # Failure Notification — opens a GitHub Issue on any job failure
  # ═══════════════════════════════════════════════════════════════════════════

  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [format-check, clippy, rustdoc, test-build, tests, doc-tests, security, file-size-policy]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = `🔴 CI Failure: Tier 1 Nightly CI — ${context.sha.substring(0, 7)}`;
            const body = [
              `## CI Pipeline Failed`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Workflow** | \`${context.workflow}\` |`,
              `| **Run** | [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Commit** | [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}) |`,
              `| **Triggered by** | @${context.actor} |`,
              ``,
              `📧 Notification sent to: githubrobbi@nios.net`,
            ].join('\n');

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Add a comment to the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
              core.info(`Updated existing issue #${existing.data[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure'],
                assignees: ['githubrobbi'],
              });
              core.info('Created new failure issue');
            }
