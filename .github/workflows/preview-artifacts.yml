#
# Preview Artifacts — the *opt-in* artifact-producing lane.
#
# Architecture (dev-flow-implementation-plan.md § 2.5 — Phases 4+5):
#
#   "Is this SHA worth human validation on real binaries?" is a
#   different question from "is this PR mergeable?".  The former is
#   rare and expensive; the latter is frequent and cheap.  This
#   workflow answers the former and DOES NOT block merges.
#
#   Triggered only when:
#     (a) a maintainer applies the `preview-binaries` label to a PR, or
#     (b) a maintainer invokes workflow_dispatch.
#
#   The `verify-pr-fast-green` gate refuses to build artifacts unless
#   `PR Fast CI / required` is *already green* on the exact SHA being
#   previewed — previewing a commit that wouldn't merge is wasted
#   human time.
#
#   Phase 5 scope: Windows binaries + nextest archive + Windows smoke
#   + per-file SHA256 manifest.  macOS / Linux preview binaries are
#   deferred to a future phase (see § 7 Non-goals in the plan doc).

name: Preview Artifacts

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to build (default: latest on default branch)'
        required: false

permissions:
  contents: read
  # Needed by verify-pr-fast-green to query check-runs on the target SHA.
  checks: read
  # Needed to inspect labels on pull_request events.
  pull-requests: read

# One preview run per PR (or per dispatch); a new push or label event
# cancels any in-progress run against the previous SHA so we never
# publish artifacts the submitter didn't actually ask about.
concurrency:
  group: preview-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.sha || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTC_WRAPPER: ""
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # gate — guard on label or manual dispatch, then emit the pinned SHA
  # that every downstream job will build and validate against.  Using a
  # pinned SHA (not github.sha, which can drift on subsequent synchronize
  # events) prevents artifact / manifest mismatches.
  # ─────────────────────────────────────────────────────────────────────
  gate:
    name: Gate (label / dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'preview-binaries'))
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      sha: ${{ steps.s.outputs.sha }}
    steps:
      - name: Resolve target SHA
        id: s
        env:
          PR_HEAD_SHA:    ${{ github.event.pull_request.head.sha }}
          DISPATCH_SHA:   ${{ github.event.inputs.sha }}
          FALLBACK_SHA:   ${{ github.sha }}
        run: |
          set -euo pipefail
          SHA="${PR_HEAD_SHA:-${DISPATCH_SHA:-$FALLBACK_SHA}}"
          if [[ -z "$SHA" ]]; then
            echo "::error::Could not resolve a target SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::preview: building SHA $SHA"

  # ─────────────────────────────────────────────────────────────────────
  # verify-pr-fast-green — refuse to waste runner minutes on a SHA that
  # isn't already merge-confidence-green.  Polls the GitHub Checks API
  # so a preview requested while PR-fast is still running waits rather
  # than failing.
  #
  # Budget: 120 × 15 s = 30 min.  PR Fast CI on a full-matrix run
  # (infra-change or rust-change) can take 20–25 min cold (test-build
  # → tests sequential + windows-check in parallel).  The original
  # 10-min cap was calibrated for docs-only short-circuit PRs and
  # timed out on the first real infra-change preview attempt
  # (2026-04-23; see §10.5 of the plan doc).  Don't drop this below
  # the p99 PR Fast CI wall-clock without also adding explicit queue-
  # awareness (the `in_progress` check is the easy part; `queued` /
  # `waiting` require treating missing check-runs as "still coming").
  # ─────────────────────────────────────────────────────────────────────
  verify-pr-fast-green:
    name: Verify PR Fast CI is green
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 32
    steps:
      - name: Poll check-runs for PR Fast CI / required
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const sha = '${{ needs.gate.outputs.sha }}';
            const want = 'PR Fast CI / required';
            // 120 × 15 s = 30 min — covers a cold full-matrix PR Fast
            // CI run (test-build → tests sequential; observed ~20 min
            // on infra-change PRs).  See comment block above this job.
            const MAX_RETRIES   = 120;
            const RETRY_DELAY_MS = 15_000;
            for (let i = 0; i < MAX_RETRIES; i++) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   sha,
                per_page: 100,
              });
              const run = data.check_runs.find(r => r.name === want);
              if (run && run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info(`✅ ${want} is success on ${sha.slice(0,7)}`);
                  return;
                }
                core.setFailed(`❌ ${want} on ${sha.slice(0,7)}: ${run.conclusion}`);
                return;
              }
              core.info(`⏳ ${want} not complete yet (status=${run?.status ?? 'missing'}); retry ${i+1}/${MAX_RETRIES}`);
              await new Promise(r => setTimeout(r, RETRY_DELAY_MS));
            }
            core.setFailed(`⏱  Timed out waiting for ${want} on ${sha.slice(0,7)}`);

  # ─────────────────────────────────────────────────────────────────────
  # build-windows — cross-compile a Windows release binary on Linux via
  # cargo-xwin.  Matches `just check-windows` but with `--release` and
  # `--bins` so the output is shippable-shaped.
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows binaries
    needs: [gate, verify-pr-fast-green]
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    env:
      # Same CPU baseline as release.yml's Windows matrix rows.
      RUSTFLAGS: "-C target-cpu=x86-64-v3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm
          df -h /

      - run: rustup show
      - run: rustup target add x86_64-pc-windows-msvc

      - uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: cargo-xwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: preview-windows

      - name: Locate llvm-rc for winresource (xwin cross-compile)
        # `winresource` v0.1.31 (`lib.rs:735-736`) hardcodes
        # `PathBuf::from("llvm-rc")` on `cfg(unix)` and spawns it without
        # any PATH augmentation from `cargo-xwin`.  On ubuntu-22.04 runners
        # `llvm-rc` ships with the preinstalled LLVM toolchain but lives
        # at `/usr/lib/llvm-<N>/bin/llvm-rc` — NOT on the default PATH.
        # Result: `crates/uffs-cli/build.rs` panics at `res.compile()` with
        # `Os { code: 2, kind: NotFound }` on every fresh xwin build, even
        # though the tool is installed.  Exporting `RC_PATH` tells
        # `winresource` exactly where to spawn from (lib.rs:733-734 takes
        # `RC_PATH` precedence over the hardcoded fallback).  Version-
        # robust: picks the highest-numbered LLVM dir so a runner image
        # bump doesn't re-break this.
        run: |
          set -euo pipefail
          RC_PATH="$(find /usr/lib/llvm-* -name llvm-rc 2>/dev/null | sort -V | tail -1)"
          test -x "$RC_PATH" || { echo "llvm-rc not found under /usr/lib/llvm-*"; exit 1; }
          echo "Located llvm-rc at: $RC_PATH"
          echo "RC_PATH=$RC_PATH" >> "$GITHUB_ENV"

      - name: cargo xwin build --release --bins --locked
        run: |
          cargo xwin build --release --bins --locked \
            --target x86_64-pc-windows-msvc

      - name: Stage Windows artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/windows
          shopt -s nullglob
          for exe in target/x86_64-pc-windows-msvc/release/*.exe; do
            cp "$exe" dist/windows/
          done
          ls -la dist/windows/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-preview-${{ needs.gate.outputs.sha }}
          path: dist/windows/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # build-test-archive — build-once / run-anywhere via `cargo nextest
  # archive`.  Runs natively on `windows-latest` (not Linux+xwin like
  # build-windows) for two reasons:
  #
  #   (1) `cargo-xwin` only wraps the `build|check|test|run|clippy|
  #       rustc` subcommands.  `cargo nextest archive` is NOT one of
  #       them, so a bare invocation on Linux runs without xwin's
  #       MSVC cross-compile env and fails in `ring`'s build.rs with
  #       `cc-rs: failed to find tool "lib.exe"`.  Observed on the
  #       2026-04-23 Phase 5 bake.
  #
  #   (2) Debug-profile xcompile via `lld-link` / `llvm-lib` hits a
  #       COFF archive format ceiling on `polars-ops` (~5.5 GB rlib).
  #       That ceiling is format-level in the LLVM toolchain only;
  #       native MSVC `link.exe` / `lib.exe` handle the same rlib
  #       without issue (confirmed 2026-04-24 on a local VS 2026
  #       dev box producing all 17 workspace binaries including
  #       polars-consumer crates).  See `docs/xwin-msvc-rlib-size-
  #       root-cause-and-workarounds.md` for the xcompile-path
  #       failure mode.
  #
  # Trade-off: no cache sharing with `build-windows` (Linux and
  # Windows caches cannot cross).  Separate `preview-test-archive-
  # windows` shared-key.  Acceptable for a preview-only lane.
  # ─────────────────────────────────────────────────────────────────────
  build-test-archive:
    name: Build Windows nextest archive
    needs: [gate, verify-pr-fast-green]
    runs-on: windows-latest
    timeout-minutes: 40
    outputs:
      nextest_version: ${{ steps.nxv.outputs.version }}
    env:
      RUSTFLAGS: "-C target-cpu=x86-64-v3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - run: rustup show

      - uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: nextest

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: preview-test-archive-windows

      - id: nxv
        name: Capture nextest version for the manifest
        shell: bash
        # Restrict awk to the first line (NR==1) so any banner / upgrade-notice
        # lines nextest emits on subsequent lines cannot pollute $GITHUB_OUTPUT
        # — a multi-line capture would produce a bare second line like
        # `0.9.132` with no `key=` prefix, failing the output-file parser with
        # "Invalid format '0.9.132'".  Observed on nextest 0.9.132 (2026-04-23).
        run: echo "version=$(cargo nextest --version | awk 'NR==1 {print $2}')" >> "$GITHUB_OUTPUT"

      - name: cargo nextest archive --target x86_64-pc-windows-msvc
        shell: bash
        run: |
          cargo nextest archive --workspace --locked \
            --target x86_64-pc-windows-msvc \
            --archive-file "uffs-tests-${{ needs.gate.outputs.sha }}.tar.zst"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nextest-archive-${{ needs.gate.outputs.sha }}
          path: uffs-tests-${{ needs.gate.outputs.sha }}.tar.zst
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # smoke-windows — download the nextest archive on a GitHub-hosted
  # Windows runner and execute it.  Satisfies both of nextest's
  # archive-on-target requirements: (a) matching source revision
  # checked out, (b) nextest installed.  NEVER run on self-hosted —
  # fork-PR code cannot execute on privileged infra (see § 2.8 in the
  # plan doc).
  # ─────────────────────────────────────────────────────────────────────
  smoke-windows:
    name: Windows smoke (run nextest archive)
    needs: [gate, build-windows, build-test-archive]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # v2
        with:
          tool: nextest

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextest-archive-${{ needs.gate.outputs.sha }}

      - name: cargo nextest run --archive-file
        shell: bash
        run: |
          cargo nextest run \
            --archive-file "uffs-tests-${{ needs.gate.outputs.sha }}.tar.zst" \
            --profile ci

  # ─────────────────────────────────────────────────────────────────────
  # manifest — emit a human-readable manifest.json with per-file SHA256,
  # tool versions, and the pinned git SHA.  GitHub's UI shows an
  # artifact-level digest on download; this manifest adds per-FILE
  # integrity so a human downloading via the browser can verify without
  # trusting the UI.
  # ─────────────────────────────────────────────────────────────────────
  manifest:
    name: Emit manifest.json
    needs: [gate, build-windows, build-test-archive, smoke-windows]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: preview

      - name: Emit manifest.json
        env:
          SHA: ${{ needs.gate.outputs.sha }}
          NXV: ${{ needs.build-test-archive.outputs.nextest_version }}
        run: |
          set -euo pipefail
          RUSTC="$(rustc --version | head -n1)"
          LOCK_SHA="$(sha256sum Cargo.lock | awk '{print $1}')"
          export RUSTC LOCK_SHA

          python3 - > manifest.json <<'PY'
          import hashlib, json, os

          sha       = os.environ["SHA"]
          lock_sha  = os.environ["LOCK_SHA"]
          rustc     = os.environ["RUSTC"]
          nextest   = os.environ["NXV"]

          files = []
          for root, _, names in os.walk("preview"):
              for n in names:
                  p = os.path.join(root, n)
                  with open(p, "rb") as fh:
                      h = hashlib.sha256(fh.read()).hexdigest()
                  files.append({"path": p, "sha256": h, "bytes": os.path.getsize(p)})
          files.sort(key=lambda f: f["path"])

          print(json.dumps({
              "git_sha":           sha,
              "tested_sha":        sha,
              "cargo_lock_sha256": lock_sha,
              "rustc_version":     rustc,
              "nextest_version":   nextest,
              "target":            "x86_64-pc-windows-msvc",
              "build_os":          "ubuntu-22.04 (cargo-xwin)",
              "files":             files,
          }, indent=2))
          PY

          echo "::group::manifest.json"
          cat manifest.json
          echo "::endgroup::"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: manifest-${{ needs.gate.outputs.sha }}
          path: manifest.json
          if-no-files-found: error
