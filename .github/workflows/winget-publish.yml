#
# WinGet Publish — auto-submit the winget-pkgs manifest on every release.
#
# When `release.yml` finishes and publishes a non-draft, non-prerelease
# GitHub Release (it sets `draft: false`, `prerelease: false`), GitHub
# emits a `release: released` event.  This workflow reacts to that event
# and uses `winget-releaser` (komac under the hood) to open a pull
# request against microsoft/winget-pkgs that bumps `SkyLLC.UFFS` to the
# new version.
#
# The action clones the *previous* version's manifest as a template and
# updates only the version, installer URL, SHA256, and release date — so
# the nested-installer structure (InstallerType: zip / NestedInstallerType:
# portable, the PortableCommandAliases uffs/uffsd/uffsmcp/uffs-mft + the
# bundled uffs-tui demo) carries over automatically with no manifest
# authoring on our side.
#
# ── nested-alias seed contract ───────────────────────────────────────
# komac PRESERVES NestedInstallerFiles across version bumps but does NOT
# auto-add executables it finds in the zip.  Each binary bundled beyond
# the founding four (uffs/uffsd/uffsmcp/uffs-mft) — currently uffs-tui,
# uffs-broker, and uffs-update — must be SEEDED into the manifest ONCE,
# into the auto-generated PR for the first release whose uffs-windows-x64.zip
# actually contains it; thereafter komac carries it forward.  Canonical
# alias list + idempotent seeder: packaging/winget/nested-aliases.yaml,
# scripts/dev/winget_seed_aliases.sh (see packaging/winget/README.md).
# NOTE: uffs-broker (shipped in the zip at v0.5.122) and uffs-update (the
# self-update helper, added to every zip tier here) are NOT yet seeded in
# the manifest — seed BOTH on the next SkyLLC.UFFS winget PR.
#
# ── Required secret ──────────────────────────────────────────────────
# `WINGET_TOKEN` — a **classic** Personal Access Token with the
# `public_repo` scope (fine-grained tokens that can fork + push to
# microsoft/winget-pkgs also work).  The default `GITHUB_TOKEN` CANNOT
# be used: it has no permission to fork an external repo or push the
# manifest branch.  Create it under the maintainer account that owns the
# winget-pkgs fork (the same account that hand-submitted PR
# microsoft/winget-pkgs#378294 for v0.5.102), then add it at
# Settings → Secrets and variables → Actions → New repository secret.

name: 📦 WinGet Publish

run-name: 📦 WinGet ${{ inputs.release-tag }}

# `workflow_dispatch` ONLY — deliberately NOT `on: release`.
#
# A GitHub Release published by `release.yml` using the default
# `GITHUB_TOKEN` does **not** emit a `release` event: GitHub suppresses
# event cascades from `GITHUB_TOKEN`-authored actions to prevent
# workflow-trigger loops.  So an `on: release:` trigger here would
# NEVER fire from our release pipeline — it was dead config.
#
# Instead, `release.yml`'s `submit-winget` job explicitly dispatches
# this workflow via `gh workflow run` once the release is published
# (the documented `GITHUB_TOKEN` → `workflow_dispatch` exception, which
# IS permitted).  `release-tag` is therefore always supplied; this is
# also the manual re-submit entry point if a release predates the
# automation or a previous run failed (e.g. expired token).
on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Git tag to publish to WinGet (e.g. v0.5.102)'
        required: true
        type: string

# Serialise submissions so two releases landing close together queue
# cleanly instead of racing to open competing winget-pkgs PRs.
concurrency:
  group: winget-publish-${{ inputs.release-tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Submit winget-pkgs manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Never run from forks — only the canonical repo holds WINGET_TOKEN.
    if: github.repository_owner == 'skyllc-ai'
    steps:
      # Needed so the post-submit step can run scripts/dev/winget_seed_aliases.sh
      # and read packaging/winget/nested-aliases.yaml (the canonical alias list).
      - name: Checkout UFFS (for the alias seeder)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Graceful no-op when the token is absent: warn (not ❌) so a
      # missing/rotated secret never shows as a hard failure.  The
      # weekly `winget-token-expiry-check.yml` is the durable alarm for
      # this condition; here we just skip cleanly.  `outputs.present`
      # gates the submit step below.
      - name: Check WINGET_TOKEN is configured
        id: token
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${WINGET_TOKEN:-}" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=WINGET_TOKEN missing::Skipping winget-pkgs submission for ${{ inputs.release-tag }} — set the WINGET_TOKEN secret, then re-run this workflow manually."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit manifest to winget-pkgs
        if: steps.token.outputs.present == 'true'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: SkyLLC.UFFS
          # Match the Windows ZIP asset uploaded by release.yml. The
          # action derives the package version from the release tag,
          # stripping the leading `v` (v0.5.102 → 0.5.102).
          installers-regex: 'uffs-windows-x64\.zip$'
          release-tag: ${{ inputs.release-tag }}
          # The account that owns the microsoft/winget-pkgs fork komac
          # pushes the manifest branch to.  MUST match the account that
          # owns WINGET_TOKEN — i.e. the maintainer who submitted the
          # original PR microsoft/winget-pkgs#378294, NOT the `skyllc-ai`
          # org (the action's default `github.repository_owner`, which
          # has no winget-pkgs fork).
          fork-user: githubrobbi
          token: ${{ secrets.WINGET_TOKEN }}

      # ── Auto-seed the extra nested aliases + draft gate ──────────────────
      #
      # komac PRESERVES the previous manifest's NestedInstallerFiles but never
      # auto-adds executables newly bundled into the zip.  So `uffs-update`
      # (every tier) and `uffs-broker` (since v0.5.122) would NOT be installed
      # by winget unless they are seeded into the manifest exactly once.  This
      # step does that automatically, on the PR komac just opened, using the
      # SAME WINGET_TOKEN (which can push to the fork) — so the winget package
      # always installs the full binary set with no manual step.
      #
      # It also flips the PR to **draft** first (best-effort): nothing can
      # merge before the seed lands.  After it pushes the seed, the PR is left
      # as a draft for a maintainer to review and mark ready.  If the fork
      # does not support drafts, the seed still happens and the PR stays ready.
      #
      # Resilient by design: every recoverable condition (PR not found yet,
      # manifest absent, draft unsupported, nothing to seed) exits 0 with a
      # warning, so the manual fallback in packaging/winget/README.md still
      # applies and a hiccup never looks like a release failure.
      - name: Seed nested aliases into the komac PR (+ draft gate)
        if: steps.token.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          FORK_USER: githubrobbi
        shell: bash
        run: |
          set -uo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "Locating the komac-opened SkyLLC.UFFS ${VERSION} PR on microsoft/winget-pkgs..."

          # komac opens the PR asynchronously — poll for it.
          PR_JSON=""
          for attempt in $(seq 1 12); do
            PR_JSON=$(gh pr list --repo microsoft/winget-pkgs \
              --author "$FORK_USER" --state open \
              --search "SkyLLC.UFFS ${VERSION}" \
              --json number,url,title,headRefName --limit 10 2>/dev/null \
              | jq -c --arg v "$VERSION" \
                  '[.[] | select((.title + " " + .headRefName) | contains($v))][0] // empty')
            [[ -n "$PR_JSON" ]] && break
            echo "  not found yet (attempt ${attempt}/12); waiting 20s..."
            sleep 20
          done

          if [[ -z "$PR_JSON" ]]; then
            echo "::warning title=winget PR not found::Could not locate the SkyLLC.UFFS ${VERSION} PR within the poll window. Seed it manually per packaging/winget/README.md once komac's PR appears."
            exit 0
          fi

          PR_URL=$(jq -r '.url' <<<"$PR_JSON")
          PR_BRANCH=$(jq -r '.headRefName' <<<"$PR_JSON")
          echo "Found PR ${PR_URL} (branch ${PR_BRANCH})"

          # Draft gate (best-effort) — block any auto-merge before the seed.
          if gh pr ready "$PR_URL" --undo 2>/tmp/draft.err; then
            echo "Converted PR to draft."
          else
            echo "::notice::Could not draft the PR (fork drafts may be unsupported): $(cat /tmp/draft.err 2>/dev/null). Continuing to seed; PR stays ready."
          fi

          # Clone the fork PR branch and run the canonical-alias seeder.
          rm -rf forkpr
          if ! git clone --depth 1 --branch "$PR_BRANCH" \
                 "https://x-access-token:${GH_TOKEN}@github.com/${FORK_USER}/winget-pkgs.git" forkpr 2>/dev/null; then
            echo "::warning::Could not clone the fork PR branch ${PR_BRANCH}; seed manually."
            exit 0
          fi
          MANIFEST="forkpr/manifests/s/SkyLLC/UFFS/${VERSION}/SkyLLC.UFFS.installer.yaml"
          if [[ ! -f "$MANIFEST" ]]; then
            echo "::warning::Expected manifest ${MANIFEST} not found; seed manually."
            exit 0
          fi

          # The seeder reads packaging/winget/nested-aliases.yaml from THIS repo
          # (checked out above) and edits the fork manifest in place. Idempotent.
          if ! "${GITHUB_WORKSPACE}/scripts/dev/winget_seed_aliases.sh" "${GITHUB_WORKSPACE}/${MANIFEST}"; then
            echo "::warning::Seeder reported a problem; seed manually per packaging/winget/README.md."
            exit 0
          fi

          cd forkpr || { echo "::warning::cannot enter forkpr; seed manually."; exit 0; }
          if git diff --quiet; then
            echo "No new aliases to seed — manifest already complete."
            exit 0
          fi
          git config user.name  "uffs-winget-bot"
          git config user.email "50460704+githubrobbi@users.noreply.github.com"
          git commit -am "Seed nested aliases (uffs-update, uffs-broker, uffs-tui) for SkyLLC.UFFS ${VERSION}"
          if git push origin "HEAD:${PR_BRANCH}" 2>/dev/null; then
            echo "Seeded + pushed to ${PR_BRANCH}."
          else
            echo "::warning::Seed committed but push failed; push HEAD:${PR_BRANCH} manually."
            exit 0
          fi

          {
            echo "## WinGet PR auto-seeded"
            echo "- PR: ${PR_URL}"
            echo "- Branch: \`${PR_BRANCH}\`"
            echo "- Seeded the canonical NestedInstallerFiles from \`packaging/winget/nested-aliases.yaml\` (uffs-update, uffs-broker, uffs-tui)."
            echo "- Left as **draft** if the fork supports it — review, then \`gh pr ready ${PR_URL}\` to validate + merge."
          } >> "$GITHUB_STEP_SUMMARY"
