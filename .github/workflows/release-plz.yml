# ─────────────────────────────────────────────────────────────────────────────
# Release-plz — DEFERRED (manual-only, 2026-05-08)
#
# Phase R4 of `docs/architecture/release-automation-plan.md`, currently
# dormant pending an upstream-polars compat release.  See the DEFERRAL
# NOTICE below for the full root-cause and re-enable trail.
#
# ─── DEFERRAL NOTICE (2026-05-08) ───────────────────────────────────────
#
# The `push: branches: [main]` auto-trigger is commented out below.  The
# workflow runs ONLY on `workflow_dispatch` (manual `gh workflow run`
# from the maintainer).  Reason:
#
#   release-plz `git_only = true` mode hardcodes
#       cargo package --allow-dirty --workspace
#   in `release_plz_core/src/next_ver.rs::run_cargo_package` (verified
#   on 2026-05-08 against release-plz v0.3.157, the version this
#   workflow pins via the action).  That step packages EVERY workspace
#   member regardless of `[[package]] release = false` or Cargo
#   `publish = false` flags.  When it runs against `uffs-polars`,
#   cargo strips the polars git rev for publish-form simulation,
#   falls back to crates.io polars-arrow 0.53.0 which constrains
#   `chrono <= 0.4.41`, and that conflicts with the workspace lock
#   at `chrono 0.4.44` (transitively required by `chrono-tz 0.10.4`).
#   The conflict has no Cargo-side resolution — verified failure on
#   workflow run 25583934251 (commit d3a1adc1d, R6 → R8 Path A merged).
#
#   PR #155 (R6 → R8 Path A) flipped the polars-tainted subtree to
#   `publish = false` + `release = false` thinking that would tell
#   release-plz to skip them.  It does — for the *release* step (no
#   PR / version bump / tag / changelog).  But it does NOT skip the
#   `cargo package --workspace` step, which is hardcoded in
#   release-plz's git_only-mode pipeline.
#
# Two structural fixes were investigated but not pursued:
#
#   (a) Move `crates/uffs-polars` from `[workspace] members` to
#       `[workspace] exclude`.  Removes it from `cargo metadata
#       --workspace`, which is what release-plz iterates.  But cargo
#       treats excluded paths as standalone packages — `uffs-polars`
#       can no longer inherit the 9 fields it gets via
#       `.workspace = true` (version, edition, rust-version, license,
#       repository, authors, readme, keywords, categories) plus
#       `[lints] workspace = true`.  Inlining those values is a
#       permanent maintenance burden until uffs-polars goes back to
#       a member.  Rejected pending a clearer return-on-cost.
#
#   (b) Replace `release-plz/action` with a manual CLI invocation
#       that wraps the cargo step ourselves.  Out of scope for the
#       current release-automation refactor cycle (R5 just finished;
#       R6/R7 already in flight).
#
# Until polars upstream ships a release that no longer needs the git
# rev pin (i.e. the nightly-rust API regressions the rev was patching
# land in a published version), this workflow stays manual-only and
# version bumps continue via `just ship` — the existing manual flow
# that has worked since v0.5.0.  The `just ship` flow:
#
#   1. uses the in-tree `build/update_all_versions.rs` driver to
#      bump every Cargo.toml's `version =` field (or `version.workspace
#      = true` consumers via the workspace.package.version source);
#   2. regenerates CHANGELOG.md via `git cliff` (configured by
#      `cliff.toml`);
#   3. opens a `chore: release vX.Y.Z` PR by hand;
#   4. once merged, the maintainer pushes a signed `vX.Y.Z` tag
#      which fires `release.yml` to build + upload binaries.
#
# Re-enable when the chrono conflict goes away:
#
#   1. Verify `cargo package -p uffs-polars --allow-dirty` succeeds
#      locally (it should once polars upstream ships).
#   2. Uncomment the `push: branches: [main]` block below.
#   3. Optionally reverse the `publish = false` flips in the polars-
#      tainted subtree if R8 dress-rehearsal is ready (8 crates —
#      see `docs/architecture/release-automation-plan.md` §8
#      deviation log row "R6 → R8 publishability resolution").
#   4. Rename this workflow back to "🚀 Release-plz (active)".
#
# Refs: PR #155 (R6→R8 Path A), workflow run 25583934251 (failure
#       evidence), `release-automation-plan.md` §8 deviation log.
#
# What this does:
#
#   On every push to `main` (and on `workflow_dispatch` for ad-hoc
#   inspection), this workflow runs the official `release-plz/action`
#   in its default two-step mode:
#
#     1. release-pr — open or update a release PR titled
#                     `chore: release vX.Y.Z` containing the proposed
#                     workspace version bump and the regenerated
#                     CHANGELOG.md entries.  Idempotent: if the PR
#                     already exists with the same plan, no-op.
#
#     2. release    — runs ONLY when the head commit is the squash-
#                     merge of the release PR (release-plz detects
#                     this by inspecting the commit subject + the
#                     `pr_branch_prefix = "release-plz-"` marker
#                     from `release-plz.toml`).  In that case it
#                     creates the `vX.Y.Z` git tag and the matching
#                     GitHub Release.  Tag push triggers
#                     `release.yml` which builds + uploads the
#                     platform binaries, CHECKSUMS, SBOMs.
#
#   The same workflow handles both phases — release-plz routes
#   internally based on the head-commit shape.
#
# Phase history:
#
#   • R3 (PR #67, 2026-04-25): this workflow ran `release-plz update`
#     in SHADOW mode (local-only file edits, no git/GitHub state
#     change, advisory only).  Sat dormant for 13 days because
#     internal path deps lacked `version =`, breaking `cargo package`
#     inside release-plz and silencing the proposed plan.
#
#   • R3.5 + R6 (PR #145, 2026-05-07): added explicit `version =`
#     to internal deps, restoring the shadow-mode plan.  First
#     successful shadow run on `main` was workflow run 25528382935
#     (cccf4f111) — enumerated all 12 publishables with proposed
#     bumps + changelog drafts.
#
#   • R4 (this PR): flips `release-plz update` (shadow) → the
#     official `release-plz/action@v0` in default mode (release-pr +
#     release).  Adds `contents: write` and `pull-requests: write`
#     permissions.  Drops the manual diff-capture and "verify no git
#     mutation" guard that were specific to shadow mode.
#
# Publishing dormancy (UNCHANGED from R3 → R6 — see plan §6):
#
#   `cargo publish` does NOT run from this workflow because:
#
#     1. `release-plz.toml` workspace `publish = false` (first layer).
#     2. No `CARGO_REGISTRY_TOKEN` env var passed to the action
#        (second layer).  release-plz.action documents that without
#        this token it skips publishing entirely and only does the
#        PR / tag / Release operations.
#
#   These two layers stay in place through R7 (OIDC scaffolding) and
#   only flip in R8 (publishing dress rehearsal for `uffs-time`).
#
# Why no schedule trigger:
#
#   The workflow runs on `push: main`, which is the trigger that
#   matters (each merge produces commits that release-plz analyses).
#   A scheduled run would re-process the same history with no new
#   data, wasting compute and producing duplicate PR comments.
#
# Why `release-plz/action` and not the manual CLI:
#
#   The action handles two pieces of book-keeping the manual CLI
#   doesn't:
#
#     1. Detection of "is this push the merge of the release PR?" —
#        needed to decide between `release-pr` and `release`.  The
#        action checks the head-commit subject and the previous
#        release PR's merged state via the GitHub API.  Doing this
#        manually would require ~30 lines of bash.
#
#     2. Idempotency: if the same proposed plan is pushed twice
#        (e.g. CI retry), the action no-ops instead of opening a
#        duplicate PR or creating a duplicate tag.
#
#   The R3 shadow workflow used the manual CLI because shadow mode
#   only needed `release-plz update` (no PR / tag / API operations),
#   and the action's overhead wasn't justified.
#
# Two-job structure (matches release-plz's own recommended workflow):
#
#   release-plz/action does NOT have a single "do both" command —
#   the action's `command:` input takes EITHER `release-pr` OR
#   `release`, never both at once.  release-plz docs and the
#   release-plz repo's OWN release-plz.yml use TWO separate jobs:
#
#     1. release-plz-pr   (command: release-pr) — runs on every push,
#                          opens or updates the release PR.
#     2. release-plz-release (command: release) — runs on every push,
#                          but no-ops unless HEAD is the merge of the
#                          release PR (release-plz detects this
#                          internally; non-merge runs exit cleanly).
#
#   We mirror that structure here.  Both jobs are nearly identical
#   apart from the `command:` value and per-job `permissions:`.
#
# ─── Downstream workflow trigger limitation (DOCUMENTED, not blocked) ───
#
# When release-plz creates a tag (`vX.Y.Z`) using the default
# `GITHUB_TOKEN`, the resulting tag push DOES NOT trigger
# `release.yml` (which has `on: push: tags: [v*]`).  This is by
# GitHub's anti-loop design — actions triggered by GITHUB_TOKEN can
# create refs but those refs don't fire downstream workflows.
#
# Workarounds, in order of preference (deferred to a follow-up PR):
#
#   A. GitHub App token — the canonical fix per release-plz docs.
#      Requires creating a GitHub App, installing it on the repo,
#      and storing `APP_ID` + `APP_PRIVATE_KEY` as secrets.  This is
#      what the release-plz repo itself uses.
#   B. Personal Access Token (PAT) stored as `RELEASE_PLZ_TOKEN`
#      secret — simpler but ties release authority to a person.
#   C. `release.yml` adds an `on: workflow_run` trigger that fires
#      after this workflow completes — fully automatic but requires
#      `release.yml` changes outside R4 scope.
#
# For R4, the maintainer manually pushes the tag (or pushes their
# own Cargo.toml + CHANGELOG bump for the first release) — that's a
# user-driven push, NOT a GITHUB_TOKEN push, so `release.yml` fires
# normally.  The R4.5 / R5 follow-up PR sets up Option A.
#
# References:
#
#   • plan §R4
#   • https://release-plz.ieni.dev/docs/github/quickstart
#   • https://release-plz.ieni.dev/docs/usage/release-pr
#   • https://release-plz.ieni.dev/docs/usage/release
#   • https://github.com/release-plz/release-plz/blob/main/.github/workflows/release-plz.yml

name: "🚀 Release-plz (manual-only — re-deferred pending crates.io bootstrap)"

on:
  # ─── RE-DEFERRED 2026-06-09 (auto-trigger disabled) ──────────────────
  # The 2026-06-09 activation (push: branches: [main]) was PREMATURE.
  # Polars 0.54.4 on crates.io resolved the chrono conflict that was the
  # FIRST blocker — but it was necessary, not sufficient.  release-plz's
  # git_only mode hardcodes `cargo package --allow-dirty --workspace`
  # (see the DEFERRAL NOTICE above), and that step still fails one layer
  # later on the crates.io BOOTSTRAP problem:
  #
  #   cargo package failed: no matching package named `uffs-broker-protocol`
  #   found, location searched: crates.io index, required by `uffs-broker`
  #
  # `cargo package` verifies each crate's *versioned* internal deps
  # against crates.io.  Nothing is published yet, so every member that
  # carries an internal `uffs-*` dep fails (uffs-broker -> uffs-broker-
  # protocol; uffs-diag -> uffs-mft + uffs-polars; the publishable
  # uffs-mft/-client/-mcp/-cli -> uffs-polars/-security/-format; etc.).
  # Only `uffs-time` + `uffs-text` (zero internal deps) package cleanly.
  #
  # This is NOT fixable by `release = false` / `publish = false` config
  # (both are ignored by the hardcoded `cargo package --workspace` step,
  # confirmed on release-plz CLI 0.3.158, run #79) nor by the nightly
  # `-Zpackage-workspace` flag (which explicitly excludes `publish =
  # false` crates — exactly our never-publish set).  The workspace has
  # never-publish crates with versioned internal deps (uffs-broker ->
  # uffs-broker-protocol) that will NEVER be on crates.io, so the
  # hardcoded `--workspace` package step can never fully succeed.
  #
  # Re-enable the push trigger ONLY after the crates.io bootstrap is
  # complete (the dependency graph's internal crates are published, so
  # `cargo package --workspace` resolves every versioned dep).  Until
  # then this workflow is workflow_dispatch-only and the first publish
  # is driven per-crate (`cargo publish -p <crate>`), NOT via release-plz
  # release-pr.  See issue #241 (publish-day umbrella).
  #
  # push:
  #   branches: [main]
  workflow_dispatch:

# Default to ZERO permissions; each job grants only what it needs.
# Matches the release-plz repo's own workflow shape.
permissions: {}

env:
  # sccache is configured for local dev via .cargo/config.toml
  # (`rustc-wrapper = "sccache"`); the GitHub-hosted runners don't
  # have it installed, so release-plz's internal `cargo package`
  # invocation dies with "could not execute process `sccache ...`
  # (never executed)".  An empty RUSTC_WRAPPER defeats the config
  # value without touching .cargo/config.toml (which would hurt
  # local dev UX).  Mirrors the same guard in pr-fast.yml.
  RUSTC_WRAPPER: ""
  # Match local policy (.cargo/config.toml sets `incremental = false`)
  # so green-locally ↔ green-in-CI, and so sccache's CARGO_INCREMENTAL
  # refusal can't resurface here.
  CARGO_INCREMENTAL: 0

jobs:
  # ────────────────────────────────────────────────────────────────
  # Release PR job — opens/updates the release PR on every push.
  # ────────────────────────────────────────────────────────────────
  release-plz-pr:
    name: Release-plz / release-pr
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Skip on forks (fork PRs can't access the repo's secrets and would
    # produce noisy "permission denied" runs).  Matches the convention
    # release-plz docs recommend.
    if: github.repository_owner == 'skyllc-ai'

    # Push branch + open/update PR.  Granted at job level so the
    # release job below can run with a tighter (no pull-requests)
    # permission set.
    permissions:
      contents: write
      pull-requests: write

    # Serialise PR-job runs on the same ref so two close-together
    # merges don't race on opening / updating the release PR.
    # `cancel-in-progress: false` because each push deserves a
    # complete plan refresh.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository (full history for tag analysis)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # release-plz needs the full git history to find the latest
          # tag (`vX.Y.Z`) and walk forward to determine the proposed
          # version bump.  Shallow clones break this analysis.
          fetch-depth: 0
          # The action handles its own auth via the `GITHUB_TOKEN` env
          # var below — no need to persist credentials in the local
          # checkout.  Matches release-plz's own workflow shape.
          persist-credentials: false

      - name: Install pinned nightly (from rust-toolchain.toml)
        # release-plz internally invokes `cargo package` in worktrees
        # checked out to past tags, so the toolchain must match what
        # the rest of CI uses.  `rustup show` reads
        # `rust-toolchain.toml` and installs the exact channel +
        # components pinned there.
        run: rustup show

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Dedicated cache key — separate from R3 shadow cache so
          # the cache effects of active mode (which compiles different
          # things during `cargo package` per-tag worktrees) don't
          # interfere with any leftover shadow cache.
          shared-key: release-plz-active-pr

      - name: Run release-plz release-pr
        # Pinned to commit SHA of the v0.5.128 tag (resolved 2026-05-08)
        # for supply-chain hygiene.  Bump alongside other action pins
        # via the standard Dependabot or manual-refresh process.
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
          config: release-plz.toml
        env:
          # `contents: write` + `pull-requests: write` granted at job
          # level; release-plz reads this token to push the release-PR
          # branch and open / update the PR.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO `CARGO_REGISTRY_TOKEN` — `release-pr` doesn't publish
          # anyway, but keeping the env clean documents intent.

  # ────────────────────────────────────────────────────────────────
  # Release job — creates tag + GitHub Release on release-PR merge.
  # ────────────────────────────────────────────────────────────────
  release-plz-release:
    name: Release-plz / release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository_owner == 'skyllc-ai'

    # Tag push only — no PR operations from this job.
    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history for tag analysis)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-plz-active-release

      - name: Run release-plz release
        # `command: release` no-ops if HEAD is not the merge of the
        # release PR — release-plz detects this internally.  So this
        # job runs on every push but only does work when the PR
        # actually merged.
        id: release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO `CARGO_REGISTRY_TOKEN` — see "Publishing dormancy"
          # comment block at the top of this file.  Adding this env
          # var is the SECOND of TWO layers that must change to
          # enable publishing; both flip in R8.

      # R4/R5: Bridge to release.yml — release-plz creates tags via GITHUB_TOKEN
      # which doesn't trigger downstream workflows (GitHub anti-loop policy).
      # Explicitly dispatch release.yml to build binaries.
      - name: Trigger release.yml for binary builds
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Releases created: ${{ steps.release-plz.outputs.releases }}"
          for release in ${{ steps.release-plz.outputs.releases }}; do
            tag=$(echo "$release" | jq -r '.tag')
            gh workflow run release.yml --ref main \
              -f version="$tag" \
              -f triggered_by="release-plz[$tag]"
          done

  # ─────────────────────────────────────────────────────────────────
  # R7: OIDC Trusted Publishing scaffolding (crates.io)
  # ─────────────────────────────────────────────────────────────────
  #
  # Phase R7 — OIDC trusted publisher scaffolding.  This job is gated
  # by the repo variable `ENABLE_CRATES_IO_PUBLISH` (unset → dormant)
  # until Phase R8 (first dress rehearsal).  It sets up the OIDC token
  # exchange with crates.io for passwordless, short-lived credentials.
  #
  # A repo-variable gate is used instead of a literal `if: false` for
  # two reasons: (1) actionlint rejects constant `if:` conditions, and
  # (2) it makes R8 activation a one-click Settings → Variables toggle
  # rather than a workflow edit + PR cycle.  The gate is a genuine
  # dormancy switch, NOT a lint-suppression hack — the job still never
  # runs until the maintainer deliberately sets the variable.
  #
  # The OIDC auth + publish steps below are now wired (R8 bootstrap
  # complete: uffs-time + uffs-text published manually with a token on
  # 2026-06-10).  Activating this automated path requires only:
  #   1. Configure crates.io crate-level trusted publishers (web UI)
  #      — Workflow filename `release-plz.yml`, Environment
  #        `crates.io-publish` (must match `environment:` below exactly)
  #   2. Create the `crates.io-publish` environment with required
  #      reviewers (manual approval gate for each published version)
  #   3. Set repo variable `ENABLE_CRATES_IO_PUBLISH = true`
  #      (Settings → Secrets and variables → Actions → Variables)
  #
  # OIDC replaces the legacy `CARGO_REGISTRY_TOKEN` secret entirely —
  # no long-lived token is ever stored once trusted publishing is on.
  #
  # See: docs/architecture/release-automation-plan.md §Phase R7/R8
  #
  crates-io-publish:
    name: crates.io / OIDC publish (R7 scaffolding)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-plz-release

    # DORMANT until R8 — set repo variable ENABLE_CRATES_IO_PUBLISH=true
    # to activate.  Unset / any-other-value keeps the job from running.
    if: ${{ vars.ENABLE_CRATES_IO_PUBLISH == 'true' }}

    environment: crates.io-publish
    permissions:
      contents: read
      id-token: write  # Required for OIDC token exchange with crates.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Rust (nightly toolchain)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: crates-io-publish

      # OIDC debug — verify token is available before attempting publish
      - name: Verify OIDC token availability
        run: |
          echo "OIDC token endpoint: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "OIDC request token available: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN != '' }}"

      # Mint a short-lived crates.io token via OIDC trusted publishing.
      # No long-lived CARGO_REGISTRY_TOKEN secret is ever stored — the
      # token is exchanged at runtime against the trusted-publisher
      # registrations on crates.io (one per publishable crate, bound to
      # this workflow filename + the `crates.io-publish` environment).
      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      # Publish the publishable crates, dependency-ordered.  The set is
      # derived from `cargo metadata` (publish != []) so it adapts as
      # more crates flip to publishable — today this is exactly
      # uffs-time + uffs-text (both dependency-free leaves, any order).
      #
      # `cargo publish` is a no-op-error if the version already exists,
      # so in steady state release-plz bumps the version first; this job
      # then publishes the freshly bumped version.  `--locked` enforces
      # the committed Cargo.lock.  `--no-verify` is intentionally NOT
      # used — we want the pre-upload build to catch packaging errors.
      - name: Publish to crates.io (OIDC, dependency-ordered)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          mapfile -t crates < <(
            cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[] | select(.publish != []) | .name' \
              | sort
          )
          echo "Publishable crates: ${crates[*]}"
          for crate in "${crates[@]}"; do
            echo "::group::cargo publish -p ${crate}"
            cargo publish -p "${crate}" --locked
            echo "::endgroup::"
          done
