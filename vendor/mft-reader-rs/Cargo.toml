[package]
name = "mft-reader"
version = "0.1.0"
edition = "2021"
description = "A Rust tool to read raw NTFS MFT records and export to CSV"
authors = ["Robert Nio"]

[dependencies]
csv = "1.3"
chrono = "0.4"
clap = { version = "4.4", features = ["derive"] }
thiserror = "1.0"
anyhow = "1.0"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Ioctl",
    "Win32_Security",
] }

[[bin]]
name = "mft-reader"
path = "src/main.rs"

