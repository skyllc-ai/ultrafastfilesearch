<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- UFFS Primary Mark — Hero bolt in a magnifier lens on a dark rounded tile -->
  <!-- Master file. All other assets derive from this. -->
  <title>UFFS — Ultra Fast File Search (Primary Mark)</title>
  <desc>Magnifier lens framing a hero lightning bolt in rust orange on a near-black tile.</desc>
  <defs>
    <linearGradient id="tileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#1E1B18"/>
      <stop offset="1"   stop-color="#0F0D0B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#F7B26B"/>
      <stop offset="0.5" stop-color="#E3782F"/>
      <stop offset="1"   stop-color="#B03618"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#B03618"/>
      <stop offset="1"   stop-color="#CE422B"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square tile (macOS / Windows 11 app-tile shape) -->
  <rect x="0" y="0" width="1024" height="1024" rx="208" ry="208" fill="url(#tileBg)"/>

  <!-- Magnifier handle: positioned bottom-right, 45° -->
  <g transform="rotate(45 680 680)">
    <rect x="680" y="680" width="296" height="92" rx="46" ry="46" fill="url(#handle)"/>
    <rect x="692" y="692" width="272" height="20" rx="10" ry="10" fill="#F7B26B" opacity="0.55"/>
  </g>

  <!-- Lens -->
  <circle cx="432" cy="432" r="312" fill="#0F0D0B"
          stroke="#DEA584" stroke-width="36"/>

  <!-- Hero lightning bolt, centered in lens -->
  <path d="
    M 492 192
    L 280 468
    L 412 468
    L 348 688
    L 600 392
    L 460 392
    L 540 192
    Z"
    fill="url(#bolt)"
    stroke="#2A0E04" stroke-width="10" stroke-linejoin="round"/>

  <!-- Glass highlight arc -->
  <path d="M 282 324 A 180 180 0 0 1 440 240" stroke="#F7D8A8" stroke-width="20"
        stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
