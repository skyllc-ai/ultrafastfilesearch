<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 512" width="2000" height="512">
  <!-- UFFS Wordmark — horizontal lockup: icon + "UFFS" + tagline -->
  <title>UFFS — Ultra Fast File Search (Wordmark)</title>
  <defs>
    <linearGradient id="wmTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1B18"/>
      <stop offset="1" stop-color="#0F0D0B"/>
    </linearGradient>
    <linearGradient id="wmBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B26B"/>
      <stop offset="1" stop-color="#B03618"/>
    </linearGradient>
  </defs>

  <!-- Icon tile (scaled to 512px) -->
  <g>
    <rect x="0" y="0" width="512" height="512" rx="104" ry="104" fill="url(#wmTile)"/>
    <g transform="rotate(45 340 340)">
      <rect x="340" y="340" width="148" height="46" rx="23" ry="23" fill="#CE422B"/>
    </g>
    <circle cx="216" cy="216" r="156" fill="#0F0D0B" stroke="#DEA584" stroke-width="18"/>
    <path d="M 246 96 L 140 234 L 206 234 L 174 344 L 300 196 L 230 196 L 270 96 Z"
          fill="url(#wmBolt)" stroke="#2A0E04" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: UFFS -->
  <g font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" fill="#F2EDE8">
    <text x="576" y="300" font-size="220" letter-spacing="-4">UFFS</text>
    <text x="580" y="400" font-size="64" font-weight="400" fill="#9A8D82" letter-spacing="2">
      ULTRA &#8226; FAST &#8226; FILE &#8226; SEARCH
    </text>
  </g>
</svg>
