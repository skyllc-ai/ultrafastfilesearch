<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- UFFS Hero Mark — Speed-streak magnifier for marketing / banners -->
  <title>UFFS — Hero Mark (Speed Streaks)</title>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1B18"/>
      <stop offset="1" stop-color="#0F0D0B"/>
    </linearGradient>
    <linearGradient id="heroRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B26B"/>
      <stop offset="1" stop-color="#CE422B"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#CE422B" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#F7B26B" stop-opacity="1"/>
      <stop offset="1"    stop-color="#FFE0A8" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="208" ry="208" fill="url(#heroBg)"/>

  <!-- Speed streaks (trailing behind the moving magnifier) -->
  <g>
    <rect x="80"  y="368" width="340" height="28" rx="14" fill="url(#streak)" opacity="0.85"/>
    <rect x="144" y="464" width="260" height="28" rx="14" fill="url(#streak)" opacity="0.75"/>
    <rect x="64"  y="560" width="400" height="28" rx="14" fill="url(#streak)" opacity="0.92"/>
    <rect x="176" y="656" width="220" height="28" rx="14" fill="url(#streak)" opacity="0.68"/>
  </g>

  <!-- Magnifier lens (offset right, like it's flying) -->
  <circle cx="576" cy="512" r="264" fill="#0F0D0B" stroke="url(#heroRing)" stroke-width="52"/>

  <!-- Bolt inside the lens -->
  <path d="
    M 612 340
    L 488 524
    L 572 524
    L 524 688
    L 672 468
    L 588 468
    L 644 340 Z"
    fill="url(#heroRing)" stroke="#2A0E04" stroke-width="8" stroke-linejoin="round"/>

  <!-- Handle -->
  <g transform="rotate(45 744 680)">
    <rect x="744" y="680" width="256" height="84" rx="42" fill="#CE422B"/>
  </g>
</svg>
