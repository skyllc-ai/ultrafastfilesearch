
# cargo-vet audits file

[[audits.assert_cmd]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-run"
delta = "2.2.1 -> 2.2.2"
notes = "Delta audit reviewed via cargo vet diff. Replaces the silent exemption bump from PR #166 (which was a supply-chain #[allow] — see docs/architecture/security/supply-chain-posture.md). Changes: (1) #[track_caller] attributes on assert/failure/success paths + replacement of `.unwrap_or_else(AssertError::panic)` chains with explicit `match` blocks so caller location is preserved through panic; (2) edition-2024 idiom updates (Self::Variant / Self {..}); (3) include-list path normalization in Cargo.toml (/build.rs etc.); (4) internal lints.clippy config tightening. No semantic changes to assertion logic, no new unsafe, no new network/FS access paths. assert_cmd is test-only (safe-to-run)."

[[audits.colored]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
version = "3.1.1"
notes = "Reviewed v3.1.1 source. Scope: ANSI terminal coloring. One unsafe block in control.rs (Windows Console FFI via windows-sys: GetStdHandle / GetConsoleMode / SetConsoleMode) — standard Win32 terminal setup, properly cfg(windows)-gated. No network I/O, no filesystem writes, no process spawning. Only std types plus windows-sys on Windows. Dev-deps (rspec, insta, ansiterm) are standard testing crates. MPL-2.0 licensed, same as our workspace."

[[audits.hashbrown]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "0.17.0 -> 0.17.1"
notes = "Reviewed 0.17.0 -> 0.17.1 source diff (6 files, +106/-28). (1) CHANGELOG / Cargo.toml{,.orig} / README — version bump (drops redundant 'authors' field) + markdown line-wrap reformat. (2) src/control/group/lsx.rs — 3-line LoongArch SX SIMD micro-opt inside an existing unsafe block: lsx_vslt_b(self.0, zero) -> lsx_vslti_b::<0>(self.0) and lsx_vor_v(special, lsx_vreplgr2vr_b(imm)) -> lsx_vori_b::<imm>(special). Replaces materialized-zero compare with the immediate-compare intrinsic. No new unsafe blocks, no new intrinsics outside the 0.17.0 set, no behavior change to SwissTable special-tag construction. LoongArch is not a shipping target for UFFS (x86_64 + aarch64 only). (3) src/rustc_entry.rs — additive: new HashMap::rustc_try_insert (PR #722) returning Result<&mut V, RustcOccupiedError> for collision-aware insertion, plus the RustcOccupiedError struct. Built on the existing self.table.find / self.table.insert_entry primitives; no new unsafe, no FFI / FS / network / process surfaces. The 'rustc_*' prefix marks it for upstream rustc consumption (hashbrown backs std::collections::HashMap). MIT OR Apache-2.0 (unchanged)."

[[audits.hermit-abi]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
version = "0.5.2"
notes = "Reviewed v0.5.2 source. Transitive dep of num_cpus. Two files: errno.rs is pure i32 constants (EPERM, ENOENT, ...); lib.rs is #![no_std] FFI declarations for the Hermit unikernel syscall interface (sys_mmap, sys_getpagesize, sys_errno, thread scheduling primitives, ...) plus two unsafe wrapper fns for get/set_priority. No network I/O, no filesystem I/O, no std dependency. On non-Hermit targets the extern C symbols are never linked and the functions are inert — num_cpus only touches hermit-abi when target_os=hermit, which none of our shipping targets hit. Apache-2.0 OR MIT; author Stefan Lankes, Hermit OS project lead."

[[audits.pastey]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
version = "0.2.2"
notes = """
Audit rationale (Apr 2026, v0.5.71):
- Transitive via rmcp → uffs-mcp (MCP framework proc-macro dependency).
- Successor fork of dtolnay's 'paste'; David Tolnay (dtolnay) is listed as
  co-author with the fork maintainer Aditya Kumar (as1100k).
- Zero runtime dependencies. Pure proc-macro crate, 1649 LOC across 4 .rs files.
- No 'unsafe' blocks anywhere in the source tree.
- No filesystem, process, or network access.
- Single ambient capability: std::env::var() in segment.rs:187, used for the
  crate's advertised compile-time env-var interpolation in paste!() macros
  (analogous to stdlib env!()). Bounded to compile time, returns a compile
  error on missing var rather than silently succeeding.
- License: MIT OR Apache-2.0 (inherited from paste)."""

[[audits.rmcp]]
who = "Robert Nio <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "1.6.0 -> 1.7.0"
notes = "Inspected 1.6.0->1.7.0 source diff (8 .rs files, ~50 lines of net change). No new unsafe blocks, no new fs/net/process/FFI surface, no crypto/auth/permission changes. Notable shifts: (a) JsonRpcError.id widened to Option<RequestId> per MCP 2025-11-25 error-response spec; (b) PromptMessageContent::Resource flattened to fix a JSON shape bug (with regression test); (c) async_rw transport switched from FramedRead to BufReader + manual line decode, adding parse-error recovery (sends JSON-RPC -32700 and continues instead of terminating) AND UTF-8 BOM stripping (RFC 8259 §8.1); (d) Cargo.toml narrows chrono to default-features=false + only the 'now' feature (surface reduction). All changes match the published CHANGELOG and are robustness improvements."

[[audits.rmcp-macros]]
who = "Robert Nio <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "1.6.0 -> 1.7.0"
notes = "Pure version-sync release: zero source code changes between 1.6.0 and 1.7.0 (verified via 'diff -qr' over the src/ trees). Only .cargo_vcs_info.json, CHANGELOG.md, Cargo.lock, and the version string in Cargo.toml differ. rmcp-macros is bumped in lockstep with the parent rmcp crate's 1.7.0 release."

[[audits.rustls]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "0.23.38 -> 0.23.39"
notes = """
Delta audit (Apr 2026, v0.5.71):
- Maintenance patch release. Total diff: 4 files changed, 10 insertions(+), 9 deletions(-).
- Cargo.toml / Cargo.toml.orig: mechanical version bump 0.23.38 → 0.23.39.
- src/client/hs.rs (ExpectServerHelloOrHelloRetryRequest::handle): the
  ECH-acceptance check's 'if !ech_state.confirm_hrr_acceptance(...)' was
  promoted from the match-arm body to a guard on the match-arm pattern.
  Semantically identical: same arm, same predicate, same side effect
  (EchStatus::Rejected). Error propagation via '?' preserved.
- src/lib.rs: adds '#![cfg_attr(read_buf, feature(core_io))]'. Pure
  nightly-only cfg-gated feature flag addition; inert on stable toolchains.
  No runtime behavior change.
- No unsafe additions, no API changes, no new ambient capabilities."""

[[audits.tokio]]
who = "Robert M1 <50460704+githubrobbi@users.noreply.github.com>"
criteria = "safe-to-deploy"
delta = "1.52.2 -> 1.52.3"
notes = "Delta audit reviewed via cargo vet diff. Replaces the silent exemption bump from PR #166 (which was a supply-chain #[allow]). Changes scoped to src/sync/mpsc/* and src/sync/rwlock.rs, implementing four documented upstream bug-fix PRs per tokio 1.52.3 release notes (May 2026): tokio#8062 fix mpsc len() underflow; tokio#8074 return TryRecvError::Empty from try_recv() when mpsc closed with outstanding permits; tokio#8075 notify receivers in mpsc OwnedPermit::release() by reusing non-owned Permit Drop impl; tokio#8076 reject RwLock::new max_readers==0 (prevents div-by-zero in semaphore fast path). Companion tests in tests/sync_mpsc.rs + tests/sync_rwlock.rs. No feature additions, no new unsafe, no public API signature changes."

