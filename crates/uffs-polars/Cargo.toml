# ============================================================================
# uffs-polars: Polars Facade Crate
# ============================================================================
#
# SPDX-License-Identifier: MPL-2.0
# Copyright (c) 2025-2026 Robert Nio
#
# This crate exists for compilation time isolation. Polars is a heavy
# dependency that takes ~4 minutes to compile. By isolating it here,
# changes to other crates don't trigger Polars recompilation.
#
# All other crates depend on this instead of Polars directly.
#
# NOTE: We intentionally track branch=main here; CI step 'update_polars_git'
#       pins the lockfile to the current main HEAD each run via
#       'cargo update -w -p polars --precise <sha>'.
# ============================================================================

[package]
name = "uffs-polars"
description = "Polars facade for UFFS (Ultra Fast File Search) - compilation isolation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
name = "uffs_polars"
path = "src/lib.rs"

# ──────────────────────────────────────────────────────────────────────────────
# POLARS SOURCE COMPILATION (ISOLATED HERE)
# ──────────────────────────────────────────────────────────────────────────────
[dependencies]
# ONLY Polars - all other dependencies provided by consuming crates
# NOTE: We intentionally track branch=main here; CI step 'update_polars_git' pins the lockfile
#       to the current main HEAD each run via 'cargo update -w -p polars --precise <sha>'.
polars = { git = "https://github.com/pola-rs/polars", branch = "main", default-features = false, features = [
    # ===== Core Features =====
    "lazy",              # Lazy evaluation (query optimization)
    "new_streaming",     # New streaming engine (replaces deprecated "streaming")
    "dtype-full",        # All data types
    "performant",        # Performance optimizations
    "serde",             # Serialization support
    "serde-lazy",        # Lazy serialization

    # ===== String Operations =====
    "strings",           # String manipulation
    "regex",             # Regex pattern matching
    "concat_str",        # String concatenation
    "string_encoding",   # Base64/hex encoding
    "string_pad",        # Padding strings
    "string_reverse",    # Reverse strings
    "string_to_integer", # Parse strings to integers
    "find_many",         # Find multiple patterns

    # ===== Temporal Operations =====
    "temporal",          # Date/time operations
    "timezones",         # Timezone support
    "dtype-date",        # Date type
    "dtype-datetime",    # DateTime type
    "dtype-time",        # Time type
    "dtype-duration",    # Duration type
    "business",          # Business day calculations
    "month_start",       # Month start dates
    "month_end",         # Month end dates
    "offset_by",         # Date offset operations

    # ===== I/O Formats =====
    "parquet",           # Parquet read/write (primary persistence)
    "json",              # JSON export
    "csv",               # CSV export
    "ipc",               # Arrow IPC format

    # ===== Query Operations =====
    "sql",               # SQL query support
    "is_in",             # IN operator
    "rows",              # Row operations
    "arg_where",         # Argument where
    "rank",              # Ranking operations
    "round_series",      # Rounding
    "abs",               # Absolute value
    "is_between",        # Range checks
    "is_first_distinct", # First occurrence of each value
    "is_last_distinct",  # Last occurrence of each value
    "is_unique",         # Check for unique values
    "search_sorted",     # Binary search in sorted arrays
    "index_of",          # Find index of value

    # ===== DataFrame Operations =====
    "diagonal_concat",   # Diagonal concatenation
    "cross_join",        # Cross join
    "semi_anti_join",    # Semi/anti joins
    "asof_join",         # Time-series joins
    "describe",          # DataFrame describe
    "pivot",             # Pivot tables
    "partition_by",      # Partitioning support
    "zip_with",          # Zip with condition
    "coalesce",          # COALESCE operation

    # ===== Aggregations =====
    "cum_agg",           # Cumulative aggregations
    "rolling_window",    # Rolling window operations
    "rolling_window_by", # Rolling window by column
    "ewma",              # Exponential weighted moving average
    "ewma_by",           # EWMA by column
    "approx_unique",     # HyperLogLog approximate distinct counts
    "unique_counts",     # Count unique values
    "top_k",             # Top-K selection
    "hist",              # Histogram binning
    "mode",              # Mode calculation

    # ===== List Operations =====
    "list_eval",         # Evaluate expressions on lists
    "list_to_struct",    # Convert list to struct
    "list_count",        # Count list elements
    "list_drop_nulls",   # Drop nulls from lists
    "list_sample",       # Sample from lists
    "list_any_all",      # Any/all on lists
    "list_gather",       # Gather elements from lists
    "list_sets",         # Set operations on lists
    "list_filter",       # Filter list elements

    # ===== Math Operations =====
    "log",               # Logarithm functions
    "trigonometry",      # Sin/cos/tan etc.
    "sign",              # Sign function
    "product",           # Product aggregation
    "diff",              # Difference operations
    "pct_change",        # Percentage change
    "interpolate",       # Interpolation
    "interpolate_by",    # Interpolate by column

    # ===== Misc Features =====
    "fmt",               # Formatting
    "cse",               # Common subexpression elimination
    "row_hash",          # Row hashing
    "random",            # Random operations
    "dynamic_group_by",  # Dynamic group by
    "extract_groups",    # Extract regex groups
    "binary_encoding",   # Binary encoding
    "to_dummies",        # One-hot encoding
    "replace",           # Value replacement
    "repeat_by",         # Repeat values by count
    "rle",               # Run-length encoding
    "cutqcut",           # Binning/quantile cuts
    "reinterpret",       # Reinterpret data types
    "decompress",        # Decompression
    "fused",             # Fused operations
    "meta",              # Expression metadata
    "range",             # Range expressions
    "bitwise",           # Bitwise operations
    "extract_jsonpath",  # JSON path extraction

    # ===== Performance & Debugging =====
    "simd",              # SIMD optimizations
    "nightly",           # Nightly Rust features
    "dot_diagram",       # Query plan visualization
] }

# ─────────────────────────────────────────────────────────────────────────────
# Lints (inherit from workspace)
# ─────────────────────────────────────────────────────────────────────────────
[lints]
workspace = true

