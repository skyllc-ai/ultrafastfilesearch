# ============================================================================
# uffs-cli: Command-Line Interface
# ============================================================================
# Fast file search from the command line.
#
# Usage:
#   uffs search "*.rs" --drive C
#   uffs index --drive C --output c_drive.parquet
#   uffs search "*.txt" --index c_drive.parquet
# ============================================================================

[package]
name = "uffs-cli"
description = "Command-line interface for UFFS (Ultra Fast File Search)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "uffs"
path = "src/main.rs"

[dependencies]
# Internal crates
uffs-mft.workspace = true
uffs-core.workspace = true

# Async runtime
tokio.workspace = true

# CLI
clap.workspace = true
indicatif.workspace = true

# Error handling
anyhow.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
dirs-next.workspace = true

# Polars facade (for main CLI index/search commands)
uffs-polars = { version = "0.2.9", path = "../uffs-polars" }

# Time handling
chrono.workspace = true

# Memory allocator - mimalloc is faster than system allocator on all platforms
mimalloc.workspace = true

# ─────────────────────────────────────────────────────────────────────────────
# Lints (inherit from workspace)
# ─────────────────────────────────────────────────────────────────────────────
[lints]
workspace = true

[dev-dependencies]
assert_cmd = "2.2.0"

