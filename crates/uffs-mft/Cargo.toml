# ============================================================================
# uffs-mft: MFT Reading & Parsing Library
# ============================================================================
# This crate provides direct NTFS Master File Table (MFT) reading
# capabilities, outputting data as Polars DataFrames.
#
# Features:
# - Direct MFT reading (bypasses Windows file enumeration APIs)
# - Async I/O for high throughput
# - Parquet persistence for fast index loading
# - Cross-platform abstractions (Windows-only for MFT, but API is portable)
# ============================================================================

[package]
name = "uffs-mft"
description = "NTFS MFT reading library for UFFS (Ultra Fast File Search)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "uffs_mft"
path = "src/main.rs"

[dependencies]
# Internal: Polars facade
uffs-polars.workspace = true

# Data structures
bitflags.workspace = true
smallvec.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true
rayon.workspace = true
zstd = { version = "0.13.3", optional = true }

# CLI (for uffs_mft binary)
clap.workspace = true
indicatif.workspace = true

# Async runtime
tokio.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
dirs-next.workspace = true
chrono.workspace = true
hostname = "0.4.2"
rustc-hash = "2.1.1"

# Windows APIs (Windows only)
[target.'cfg(windows)'.dependencies]
windows.workspace = true
crossbeam-channel = "0.5.15"

[dev-dependencies]
criterion.workspace = true
proptest.workspace = true
tokio = { workspace = true, features = ["test-util", "macros"] }

[[bench]]
name = "mft_read"
harness = false

# ─────────────────────────────────────────────────────────────────────────────
# Lints (inherit from workspace, unsafe allowed case-by-case via #[allow])
# ─────────────────────────────────────────────────────────────────────────────
[lints]
workspace = true

[features]
default = ["zstd"]
zstd = ["dep:zstd"]

